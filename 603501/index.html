    function filterByPeriod(data, period) {
        if (period === 'all') return data;
        const now = new Date(data[data.length - 1].date);
        const cutoff = new Date(now);
        if (period === '1y') cutoff.setFullYear(now.getFullYear() - 1);
        else if (period === '5y') cutoff.setFullYear(now.getFullYear() - 5);
        return data.filter(d => new Date(d.date) >= cutoff);
    }

    let chart;
    function initChart() {
        chart = echarts.init(document.getElementById('chart'), 'dark');
        drawChart();
        window.addEventListener('resize', () => chart.resize());
    }

    function drawChart() {
        const data = filterByPeriod(FULL_DATA, '1y');
        const dates = data.map(d => d.date);

        const option = {
            backgroundColor: 'transparent',
            tooltip: { 
                trigger: 'axis', 
                axisPointer: { type: 'cross' },
                formatter: function(params) {
                    const d = params[0];
                    let s = `<strong>${d.axisValue}</strong><br/>`;
                    params.forEach(p => {
                        if (p.seriesName === '收盘价') {
                            s += `${p.marker} ${p.seriesName}: <strong>$${p.value !== null ? p.value.toFixed(2) : '-'}</strong><br/>`;
                        }
                    });
                    return s;
                }
            },
            grid: { left: '1%', right: '1%', top: '8%', bottom: '8%', containLabel: true },
            xAxis: { 
                type: 'category', 
                data: dates, 
                axisLine: { lineStyle: { color: '#30363d' } }, 
                axisLabel: { color: '#8b949e', fontSize: 11, formatter: v => v.slice(0, 10) }, 
                splitLine: { show: false } 
            },
            yAxis: [{
                type: 'value', 
                scale: true, 
                position: 'right', 
                splitLine: { lineStyle: { color: '#21262d' } }, 
                axisLabel: { color: '#8b949e', fontSize: 11, formatter: v => '$' + v.toFixed(0) } 
            }],
            dataZoom: [{
                type: 'inside', 
                xAxisIndex: [0], 
                start: 0, 
                end: 100 
            }],
            series: [{
                name: '收盘价',
                type: 'line',
                data: data.map(d => [d.date, d.close]),
                smooth: true,
                symbol: 'none',
                lineStyle: { width: 2, color: '#58a6ff' },
                areaStyle: { 
                    color: { 
                        type: 'linear', 
                        x: 0, y: 0, x2: 0, y2: 1, 
                        colorStops: [

                            { offset: 1, color: 'rgba(88,166,255,0.02)' }
                        ] 
                    } 
                }
            }]
        };
        chart.setOption(option);
    }

        const tbody = document.getElementById('compare-table-body');

        ).join('');
    }

        const change = 0.77;
