            } else if (nyHour >= 4 && nyHour < 9.5) {
                status = { cls: 'pre', txt: '🟡 盘前交易时段' };
            } else {
                status = { cls: 'closed', txt: '🔴 美股已收盘 (数据截至: ' + (LATEST_DATE || '--') + ')' };
            }
        } else {
            status = { cls: 'closed', txt: '🔴 美股休市 (周末)' };
        }
        dot.className = 'status-dot ' + status.cls;
        text.textContent = status.txt;
    })();

    function isUSDaylightSaving(d) {
        const y = d.getUTCFullYear();
        // 3月第二个周日
        const mar = new Date(Date.UTC(y, 2, 1));
        mar.setUTCDate(mar.getUTCDate() + (7 - mar.getUTCDay()) % 7 + 7);
        // 11月第一个周日
        const nov = new Date(Date.UTC(y, 10, 1));
        nov.setUTCDate(nov.getUTCDate() + (7 - nov.getUTCDay()) % 7);
        return d >= mar && d < nov;
    }

    // ── 卡片渲染 ──
    function renderGrid(data, containerId) {
        const grid = document.getElementById(containerId);
        const isEtf = containerId === 'etf-grid';
        grid.innerHTML = data.map(f => `
            <a class="fund-card" href="/${f.ticker.toLowerCase()}/">
                <div class="fund-card-top">
                    <div>
                        <div class="fund-ticker">${f.ticker}</div>
                        <div class="fund-name" title="${f.name}">${f.name}</div>
                    </div>
                    <div>
                        <div class="fund-price">$${f.latest_close.toFixed(2)}</div>
                        <div class="fund-change ${f.change_pct >= 0 ? 'up' : 'down'}">${f.change_pct >= 0 ? '+' : ''}${f.change_pct.toFixed(2)}%</div>
                    </div>
                </div>
                <div class="fund-desc">${f.desc}</div>
                <div class="fund-metrics">
                    <div class="metric"><div class="metric-label">年化</div><div class="metric-value color-dynamic" style="color:${f.annual_return >= 0 ? 'var(--green)' : 'var(--red)'}">${f.annual_return >= 0 ? '+' : ''}${f.annual_return.toFixed(1)}%</div></div>
                    <div class="metric"><div class="metric-label">52周高</div><div class="metric-value">$${f.high.toFixed(0)}</div></div>
                    <div class="metric"><div class="metric-label">52周低</div><div class="metric-value">$${f.low.toFixed(0)}</div></div>
                </div>
                <div class="mini-chart" id="mini-${f.ticker}"></div>
            </a>
        `).join('');
    }

    // ── 迷你走势图（红涨绿跌） ──
    function drawMini(data) {
        data.forEach(f => {
            const el = document.getElementById('mini-' + f.ticker);
            if (!el || !f.price_history || f.price_history.length === 0) return;
            const chart = echarts.init(el);
            const prices = f.price_history.map(p => p.close);
            const min = Math.min(...prices), max = Math.max(...prices);
            const up = (f.change_pct || 0) >= 0;
            // 红涨绿跌: up=红(#ef4444), down=绿(#22c55e)
            const lineColor = up ? '#ef4444' : '#22c55e';
            const areaTop = up ? 'rgba(239,68,68,0.25)' : 'rgba(34,197,94,0.25)';
            chart.setOption({
                backgroundColor: 'transparent',
                grid: { left: 0, right: 0, top: 2, bottom: 0 },
                xAxis: { type: 'category', show: false, data: f.price_history.map(p => p.date) },
                yAxis: { type: 'value', show: false, min, max },
                series: [{
                    type: 'line', data: prices, smooth: true, symbol: 'none',
                    lineStyle: { width: 1.5, color: lineColor },
                    areaStyle: { color: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1,
                        colorStops: [{ offset: 0, color: areaTop }, { offset: 1, color: 'transparent' }] } }
                }]
            });
        });
    }

    renderGrid(ETF_DATA, 'etf-grid');
    renderGrid(STOCK_DATA, 'stock-grid');
    setTimeout(() => { drawMini(ETF_DATA); drawMini(STOCK_DATA); }, 100);
    window.addEventListener('resize', () => { drawMini(ETF_DATA); drawMini(STOCK_DATA); });

    // ── 返回顶部按钮 ──
    (function() {
        const btn = document.createElement('a');
        btn.href = '#';
        btn.textContent = '⬆';
        btn.style.cssText = 'position:fixed;bottom:24px;right:24px;width:40px;height:40px;border-radius:50%;background:var(--bg-secondary);border:1px solid var(--border);color:var(--text-secondary);display:flex;align-items:center;justify-content:center;font-size:16px;text-decoration:none;opacity:0;transition:opacity 0.3s;z-index:99;cursor:pointer;';
        btn.title = '返回顶部';
        document.body.appendChild(btn);
        window.addEventListener('scroll', () => {
            btn.style.opacity = window.scrollY > 200 ? '1' : '0';
        });
        btn.addEventListener('click', (e) => {
            e.preventDefault();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    })();
    </script>
