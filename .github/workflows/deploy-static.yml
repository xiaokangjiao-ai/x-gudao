name: Deploy Static Site with JSON Data

on:
  schedule:
    # 每周一～五 06:00 UTC = 14:00 北京时间（美股收盘后约9小时）
    - cron: '0 6 * * 1-5'
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyyaml requests

      - name: Run data sync (增量更新数据库)
        env:
          MASSIVE_API_KEY: ${{ secrets.MASSIVE_API_KEY }}
        run: |
          python src/massive_fetcher.py --mode daily

      - name: Generate static JSON files
        run: python src/export_json.py

      - name: Build site
        run: |
          mkdir -p _site
          # Copy static files
          cp -r static/* _site/ 2>/dev/null || true
          # Copy output files (JSON data + HTML)
          cp -r output/* _site/
          # Ensure directories exist
          mkdir -p _site/stocks _site/compare _site/css _site/js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
