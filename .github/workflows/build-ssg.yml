name: Build and Deploy SSG Static Site

on:
  schedule:
    # 每天 06:00 北京时间 = UTC 22:00
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 需要完整的git历史来push

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install jinja2 yfinance numpy pandas

      - name: Generate static site
        run: python src/generate_static.py
        env:
          # 确保UTF-8输出
          PYTHONIOENCODING: utf-8

      - name: Create gh-pages branch if not exists
        run: |
          git checkout --orphan gh-pages 2>/dev/null || true
          # 删除所有内容（全新分支）
          git rm -rf --cached . 2>/dev/null || true
          rm -rf .git/index 2>/dev/null || true
          # 从生成的内容初始化
          cp -r _site/* .
          rm -rf _site/

      - name: Commit and push to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "deploy: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" || exit 0
          git push origin gh-pages --force
