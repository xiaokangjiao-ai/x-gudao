# FastAPI 后端 CI workflow
# 注意：此 workflow 仅做构建测试，实际部署需自行配置 Railway / Render / 自有服务器
# 推荐部署方式：
#   - Railway: 连接 GitHub 仓库，自动检测 Dockerfile 部署
#   - Render: 创建 Web Service，选择 Dockerfile 或 Python 环境
#   - 自有服务器: 使用下方 Dockerfile + docker-compose 部署

name: FastAPI CI

on:
  push:
    branches: [ main ]
    paths:
      - 'app.py'
      - 'src/**'
      - 'requirements.txt'
      - 'Dockerfile'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run smoke test
        run: python -c "from src.data_fetcher import DataFetcher; print('OK')"
