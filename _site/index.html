    <style>

            --radius-sm: 10px; --radius-md: 16px; --radius-lg: 22px; --radius-xl: 28px;

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg-primary); color: var(--text-primary); line-height: 1.65; min-height: 100vh; }
        a { color: var(--accent); text-decoration: none; transition: color .2s; }
        a:hover { color: var(--gold-light); }

            content:''; position:fixed; top:-50%; left:-50%; width:200%; height:200%;
            background:

            pointer-events:none; z-index:0;
        }

        /* ── Header ── */
        header { position: sticky; top:0; z-index:200; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);

        .logo span { color: var(--gold-light); background: linear-gradient(135deg, var(--gold-light), var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .logo-divider { color: var(--text-dim); font-weight: 300; letter-spacing: 2px; font-size:13px; }
        .logo-sub { color: var(--text-secondary); font-size: 15px; font-weight: 400; }

        /* ── Hero ── */
        .hero { text-align: center; padding: 56px 24px 36px; position:relative; z-index:1;
            background: linear-gradient(180deg, rgba(212,168,67,0.06) 0%, transparent 60%); }
        .hero-badge { display:inline-flex; align-items:center; gap:6px; padding:6px 16px; border-radius:20px;
            background: rgba(212,168,67,0.08); border: 1px solid rgba(212,168,67,0.2); font-size:12px; font-weight:600;
            color: var(--gold-light); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 20px; }
        .hero h1 { font-size: 42px; font-weight: 800; letter-spacing: -1px; line-height: 1.15; margin-bottom: 12px; }
        .hero h1 span { background: linear-gradient(135deg, var(--gold-light), var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .hero-subtitle { font-size: 16px; color: var(--text-secondary); max-width: 600px; margin: 0 auto; font-weight: 300; letter-spacing: 0.3px; }

        /* ── 板块导航 ── */
        .sector-nav { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; padding: 8px 24px 0; max-width: 1100px; margin: 0 auto; position:relative; z-index:1; }
        .sector-btn {
            padding: 13px 26px; border-radius: var(--radius-xl); background: var(--bg-card);
            border: 1px solid var(--border); color: var(--text-secondary); font-size: 14px; font-weight: 600;
            cursor: pointer; transition: all .3s cubic-bezier(.4,0,.2,1); font-family: inherit; white-space: nowrap;
            user-select: none; position:relative; overflow:hidden; letter-spacing: 0.2px;
        }
        .sector-btn::before { content:''; position:absolute; inset:0; background: radial-gradient(circle at 50% 0, rgba(212,168,67,0.15), transparent 70%); opacity:0; transition: opacity .3s; }
        .sector-btn:hover { border-color: var(--border-hover); color: var(--text-primary); transform: translateY(-2px); box-shadow: var(--glow-gold); }
        .sector-btn:hover::before { opacity:1; }
        .sector-btn.active { background: linear-gradient(135deg, rgba(212,168,67,0.12), rgba(212,168,67,0.05));
            border-color: var(--gold); color: var(--gold-light); box-shadow: var(--glow-gold), inset 0 1px 0 rgba(255,255,255,0.05); }
        .sector-btn.active::before { opacity:1; }

        /* ── 板块内容区 ── */
        .sector-content { max-width: 1280px; margin: 28px auto 0; padding: 0 24px 72px; position:relative; z-index:1; }
        .sector-panel { display:none; animation: panelIn .45s cubic-bezier(.4,0,.2,1) forwards; }
        .sector-panel.active { display:block; }
        @keyframes panelIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
        .section-label { font-size: 17px; font-weight: 600; margin-bottom: 20px; color: var(--gold-light); display:flex; align-items:center; gap:10px; letter-spacing: 0.3px; }
        .section-label::after { content:''; flex:1; height:1px; background: linear-gradient(90deg, var(--border), transparent); }

        /* ── 研报卡片网格 ── */

        @media (max-width: 1100px) { .research-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 720px) { .research-grid { grid-template-columns: 1fr; } }
        .research-card {
            background: linear-gradient(145deg, var(--bg-card), rgba(21,28,44,0.7));
            border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden;
            transition: all .35s cubic-bezier(.4,0,.2,1); display: flex; flex-direction: column;
            position:relative;
        }
        .research-card::before { content:''; position:absolute; inset:0; border-radius: var(--radius-lg); padding:1px;
            background: linear-gradient(145deg, transparent 60%, rgba(212,168,67,0.15)); -webkit-mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); mask-composite:exclude; -webkit-mask-composite: xor; pointer-events:none; opacity:0; transition: opacity .35s; }
        .research-card:hover { border-color: var(--border-hover); transform: translateY(-6px); box-shadow: 0 20px 50px rgba(0,0,0,0.4), 0 0 30px rgba(212,168,67,0.08); }
        .research-card:hover::before { opacity:1; }

        /* ── 图表区 ── */
        .research-chart-area { height: 150px; background: linear-gradient(160deg, #0d1220 0%, #131b2e 100%);

        .research-chart-area svg { width: 100%; height: 100%; }

        .research-metric-val { font-size: 16px; font-weight: 700; }
        .research-metric-val.up { color: var(--green); }
        .research-metric-val.down { color: var(--red); }
        .research-metric-label { font-size: 9.5px; color: var(--text-dim); margin-top: 3px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }

        .research-link-btn:hover { background:rgba(107,163,255,0.18); border-color:rgba(107,163,255,0.3); text-decoration:none; color:#8ec5ff; transform: translateX(3px); }

        .status-badge.bearish { background:rgba(248,113,113,0.12); color:var(--red); border:1px solid rgba(248,113,113,0.25); }

function safeNum(v, fb=0) { const n=Number(v); return isNaN(n)?fb:n; }
function safeStr(v) { return v===undefined||v===null?'':String(v); }
function safeStars(n) { const s=Math.round(safeNum(n,0)); return Math.max(0,Math.min(5,s)); }

function statusBadge(ms) {
    const m={
        "多头排列":'<span class="status-badge bullish">🟢 强劲牛市</span>',
        "偏多":'<span class="status-badge neutral-bull">🟡 震荡蓄势</span>',
        "中性":'<span class="status-badge neutral-bear">🟠 风险警示</span>',
        "偏空":'<span class="status-badge neutral-bear">🟠 风险警示</span>',
        "空头压制":'<span class="status-badge bearish">🔴 趋势走弱</span>',
    };
    return m[ms]||'<span class="status-badge neutral-bear">⚪ 未知</span>';
}

function buildSparklineSVG(prices, w=340, h=150) {
    if (!prices || prices.length < 2) return `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg"><text x="${w/2}" y="${h/2}" text-anchor="middle" fill="#555" font-size="12">暂无数据</text></svg>`;
    const min=Math.min(...prices), max=Math.max(...prices), range=max-min||1;
    const pad=10;
    const pts=prices.map((p,i)=>{const x=pad+(i/(prices.length-1))*(w-2*pad);const y=h-pad-((p-min)/range)*(h-2*pad);return`${x},${y}`}).join(' ');
    const areaPts=`${pad},${h-pad} ${pts} ${w-pad},${h-pad}`;
    const lastPrice=prices[prices.length-1], firstPrice=prices[0];
    const chgPct=((lastPrice-firstPrice)/firstPrice*100).toFixed(2);
    const lc=lastPrice>=firstPrice?'#34d399':'#f87171';
    const fc=lastPrice>=firstPrice?'rgba(52,211,153,0.10)':'rgba(248,113,113,0.10)';
    return `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
        <defs><linearGradient id="gd" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="${fc}"/><stop offset="100%" stop-color="transparent"/></linearGradient></defs>
        <polygon points="${areaPts}" fill="url(#gd)"/>
        <polyline points="${pts}" fill="none" stroke="${lc}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="${pad+(prices.length-1)/(prices.length-1)*(w-2*pad)}" cy="${h-pad-((lastPrice-min)/range)*(h-2*pad)}" r="4" fill="${lc}" stroke="#0d1220" stroke-width="1.8"/>
        <rect x="${w-68}" y="6" width="62" height="22" rx="6" fill="${lc}" fill-opacity="0.12"/><text x="${w-37}" y="21" text-anchor="middle" fill="${lc}" font-size="11.5" font-weight="700">${chgPct>0?'+':''}${chgPct}%</text>
    </svg>`;
}

function getReportData(ticker, o) {
    const price=safeNum(o.latest_close);
    const chg=safeNum(o.change_pct);
    const ret=safeNum(o.annual_return);
    const vol=safeNum(o.volatility);
    const score=safeNum(o.score);
    const stars=safeStars(o.stars);
    const dp=safeNum(o.data_points);
    const hi=safeNum(o.high), lo=safeNum(o.low);
    const history=(o.price_history||[]).map(p=>p.close);
    const drawdown=hi>lo?((hi-lo)/hi*100).toFixed(1):'0.0';
    const volLevel=vol>30?'极高':vol>25?'较高':vol>18?'适中':vol<12?'偏低':'正常';
    const rpt=REPORTS[ticker]||REPORTS['NVDA'];
    return {
        price,chg,ret,vol,score,stars,dp,hi,lo,drawdown,volLevel,history,
        title:rpt.title,
        summary:rpt.summaryFn({price,chg,ret,vol,volLevel,dp,hi,lo,drawdown,score,stars}),
        analysis:rpt.analysisFn({price,chg,ret,vol,volLevel,dp,hi,lo,drawdown,score,stars}),
        view:rpt.viewFn({price,chg,ret,vol,volLevel,dp,hi,lo,drawdown,score,stars}),
        verdict:score>=70?'🟢 核心持仓级':score>=50?'🟡 积极关注':'🔴 观望等待',
    };
}

                    <div class="research-metric"><div class="research-metric-val">$${d.price.toFixed(2)}</div><div class="research-metric-label">最新价</div></div>
                    <div class="research-metric"><div class="research-metric-val ${d.chg>=0?'up':'down'}">${d.chg>=0?'+':''}${d.chg.toFixed(2)}%</div><div class="research-metric-label">周涨跌</div></div>
                    <div class="research-metric"><div class="research-metric-val" style="color:var(--gold-light);">${d.drawdown}%</div><div class="research-metric-label">区间回撤</div></div>
                </div>
            </div>
            <div class="research-footer">
                <div class="verdict-tag ${vClass}">${d.verdict}</div>
                <a class="research-link-btn" href="/${ticker.toLowerCase()}/">详情 →</a>
            </div>
        </div>`}).join('');
    
    // A股卡片
    const aShareCards = (sector.aShares || []).map(code => {
        const info = ASHARES[code] || {};
        return `
        <div class="research-card" style="border-color:rgba(239,68,68,0.25);">
            <div class="research-chart-area" style="background:linear-gradient(160deg,#1a0a0a 0%,#0d1220 100%);">
                <div style="text-align:center;color:#ef4444;font-size:48px;opacity:0.3;">🇨🇳</div>
            </div>
            <div class="research-body">
                <div class="research-header">
                    <div>
                        <div class="research-ticker" style="background:linear-gradient(135deg,#ef4444,#dc2626);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">${code}</div>
                        <div class="research-name">🇨🇳 ${info.name || 'A股标的'}</div>
                    </div>
                    <div class="score-wrap">
                        <div class="research-score-val" style="color:#ef4444;">--</div>
                        <div class="research-score-label">暂无数据</div>
                    </div>
                </div>
                <div class="research-stars">☆☆☆☆☆</div>
                <div class="research-content">
                    <p>${info.view || 'A股市场核心标的，数据接入中...'}</p>
                </div>
                <div class="research-metrics">
                    <div class="research-metric"><div class="research-metric-val">--</div><div class="research-metric-label">最新价</div></div>
                    <div class="research-metric"><div class="research-metric-val">--</div><div class="research-metric-label">周涨跌</div></div>
                    <div class="research-metric"><div class="research-metric-val" style="color:#ef4444;">--</div><div class="research-metric-label">区间回撤</div></div>
                </div>
            </div>
            <div class="research-footer">
                <div class="verdict-tag wait">🔴 数据接入中</div>
                <span class="research-link-btn" style="opacity:0.4;cursor:not-allowed;">详情 →</span>
            </div>
        </div>`;}).join('');
    
    return `<div class="section-label">${sector.label} · 本周精选</div><div class="research-grid">${cards}${aShareCards}</div>`;
}

function initSectors() {
    const nav = document.getElementById('sector-nav');
    const content = document.getElementById('sector-content');

    nav.innerHTML = SECTORS.map(s => `<button class="sector-btn" data-id="${s.id}">${s.label}</button>`).join('');
    content.innerHTML = SECTORS.map(s => `<div class="sector-panel" id="panel-${s.id}">${renderSectorPanel(s)}</div>`).join('');

    let activeId = SECTORS[0].id;
    document.querySelector(`.sector-btn[data-id="${activeId}"]`).classList.add('active');
    document.getElementById(`panel-${activeId}`).classList.add('active');

    nav.addEventListener('click', e => {
        const btn = e.target.closest('.sector-btn');
        if (!btn || btn.dataset.id === activeId) return;
        document.querySelectorAll('.sector-btn').forEach(b=>b.classList.remove('active'));
        document.querySelectorAll('.sector-panel').forEach(p=>p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(`panel-${btn.dataset.id}`).classList.add('active');
        activeId = btn.dataset.id;
    });
}
try { initSectors(); } catch(e) { console.error('[initSectors]', e); }
</script>
</body>
</html>
