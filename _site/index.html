    function renderGrid() {
        const grid = document.getElementById('fund-grid');
        grid.innerHTML = OVERVIEW.map(f => `
            <a class="fund-card" href="/${f.ticker.toLowerCase()}/">
                <div class="fund-card-top">
                    <div>
                        <div class="fund-tag">${f.category}</div>
                        <div class="fund-ticker">${f.ticker}</div>
                        <div class="fund-name">${f.name}</div>
                    </div>
                    <div>
                        <div class="fund-price">$${f.latest_close.toFixed(2)}</div>
                        <div class="fund-change ${f.change_pct >= 0 ? 'up' : 'down'}">${f.change_pct >= 0 ? '▲ +' : '▼ '}${f.change_pct.toFixed(2)}%</div>
                    </div>
                </div>
                <div class="fund-metrics">
                    <div class="metric"><div class="metric-label">年化收益</div><div class="metric-value" style="color:${f.annual_return >= 0 ? 'var(--green)' : 'var(--red)'}">${f.annual_return >= 0 ? '+' : ''}${f.annual_return.toFixed(1)}%</div></div>
                    <div class="metric"><div class="metric-label">52W高</div><div class="metric-value">$${f.high.toFixed(0)}</div></div>
                    <div class="metric"><div class="metric-label">52W低</div><div class="metric-value">$${f.low.toFixed(0)}</div></div>
                </div>
                <div class="mini-chart" id="mini-${f.ticker}"></div>
            </a>
        `).join('');
    }

    function renderCompare() {
        const tbody = document.getElementById('compare-tbody');
        const best = { ret: null, vol: null };
        OVERVIEW.forEach(f => {
            if (best.ret === null || f.annual_return > best.ret) best.ret = f.annual_return;
            if (best.vol === null || f.volatility < best.vol) best.vol = f.volatility;
        });
        tbody.innerHTML = OVERVIEW.map(f => `
            <tr>
                <td><a class="ticker-link" href="/${f.ticker.toLowerCase()}/">${f.ticker}</a></td>
                <td>${f.name}</td>
                <td class="num">$${f.latest_close.toFixed(2)}</td>
                <td class="num">$${f.high.toFixed(2)}</td>
                <td class="num">$${f.low.toFixed(2)}</td>
                <td class="num ${f.annual_return === best.ret ? 'best' : ''}" style="color:${f.annual_return >= 0 ? 'var(--green)' : 'var(--red)'}">${f.annual_return >= 0 ? '+' : ''}${f.annual_return.toFixed(2)}%</td>
                <td class="num ${f.volatility === best.vol ? 'best' : ''}">${f.volatility.toFixed(2)}%</td>
                <td class="num">${f.data_points}</td>
            </tr>
        `).join('');
    }

    function drawMiniCharts() {
        OVERVIEW.forEach(f => {
            const el = document.getElementById('mini-' + f.ticker);
            if (!el) return;
            const chart = echarts.init(el);
            const prices = f.price_history.map(p => p.close);
            const min = Math.min(...prices), max = Math.max(...prices);
            chart.setOption({
                backgroundColor: 'transparent',
                grid: { left: 0, right: 0, top: 2, bottom: 0 },
                xAxis: { type: 'category', show: false, data: f.price_history.map(p => p.date) },
                yAxis: { type: 'value', show: false, min, max },
                series: [{
                    type: 'line',
                    data: prices,
                    smooth: true,
                    symbol: 'none',
                    lineStyle: { width: 1.5, color: f.change_pct >= 0 ? '#3fb950' : '#f85149' },
                    areaStyle: {
                        color: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1,
                            colorStops: [
                                { offset: 0, color: f.change_pct >= 0 ? 'rgba(63,185,80,0.2)' : 'rgba(248,81,73,0.2)' },
                                { offset: 1, color: 'transparent' }
                            ]
                        }
                    }
                }]
            });
        });
    }

    renderGrid();
    renderCompare();
    setTimeout(drawMiniCharts, 100);
    window.addEventListener('resize', () => { if (window.drawMiniCharts) drawMiniCharts(); });
    </script>
