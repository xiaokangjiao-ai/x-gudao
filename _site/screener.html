    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0d1117; --bg-secondary: #161b22; --bg-card: #1c2128;
            --border: #30363d; --text-primary: #e6edf3; --text-secondary: #8b949e;
            --accent: #58a6ff; --green: #3fb950; --red: #f85149; --gold: #d4a843;
        }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg-primary); color: var(--text-primary); line-height: 1.6; }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* ── 头部（只保留 Logo）── */
        header { background: var(--bg-secondary); border-bottom: 1px solid var(--border); padding: 0 24px; position: sticky; top: 0; z-index: 100; }
        .header-inner { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; height: 56px; }
        .logo { font-size: 18px; font-weight: 700; }
        .logo span { color: var(--gold); }

        /* ── 全局 Badge ── */
        .status-badge {
            display: inline-block; padding: 4px 12px; border-radius: 12px;
            font-size: 12px; font-weight: 700; letter-spacing: 0.5px; white-space: nowrap;
        }
        .status-badge.bullish { background: #1a6b1a; color: #fff; }
        .status-badge.neutral-bull { background: #b8860b; color: #000; }
        .status-badge.neutral-bear { background: #d2691e; color: #fff; }
        .status-badge.bearish { background: #b22222; color: #fff; }

        /* ── Hero ── */
        .hero {
            text-align: center; padding: 50px 24px 30px;
            background: linear-gradient(180deg, rgba(212,168,67,0.08) 0%, transparent 100%);
        }
        .hero h1 { font-size: 40px; font-weight: 700; margin-bottom: 10px; letter-spacing: -0.5px; }
        .hero h1 span { color: var(--gold); }
        .hero-subtitle { font-size: 15px; color: var(--text-secondary); max-width: 700px; margin: 0 auto 20px; }
        .hero-tags { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 0; }
        .hero-tag { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; font-size: 13px; color: var(--text-secondary); }

        /* ════════════════ V5.0: 研报式 Top3 ════════════════ */
        .main { max-width: 1400px; margin: 0 auto; padding: 0 24px 60px; }
        .section-title { font-size: 22px; font-weight: 600; margin: 40px 0 24px; display: flex; align-items: center; gap: 10px; }

        .research-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
        .research-card {
            background: var(--bg-card); border: 1px solid rgba(212,168,67,0.35);
            border-radius: 16px; overflow: hidden; transition: all 0.3s;
            display: flex; flex-direction: column;
        }
        .research-card:hover { border-color: var(--gold); transform: translateY(-4px); box-shadow: 0 8px 32px rgba(212,168,67,0.15); }

        /* 研报头部：迷你走势图 */
        .research-chart-area {
            height: 140px; background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
        }
        .research-chart-area svg { width: 100%; height: 100%; }

        /* 研报主体 */
        .research-body { padding: 20px 22px 18px; flex: 1; display: flex; flex-direction: column; }
        .research-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .research-ticker-group { }
        .research-ticker { font-size: 26px; font-weight: 700; color: var(--gold); letter-spacing: 1px; }
        .research-name { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
        .research-score-badge {
            text-align: right;
        }
        .research-score-val { font-size: 28px; font-weight: 700; color: var(--gold); }
        .research-score-label { font-size: 11px; color: var(--text-secondary); }
        .research-stars { font-size: 16px; margin-bottom: 10px; letter-spacing: 2px; }

        /* 研报正文 */
        .research-content { font-size: 13.5px; line-height: 1.75; color: var(--text-primary); margin-bottom: 14px; flex: 1; }
        .research-content strong { color: var(--gold); }
        .research-content em { color: var(--accent); font-style: normal; }
        .research-highlight {
            background: rgba(212,168,67,0.08); border-left: 3px solid var(--gold);
            padding: 10px 14px; border-radius: 0 8px 8px 0; margin: 10px 0;
            font-size: 13px; line-height: 1.65;
        }
        .research-highlight .hl-label { font-size: 11px; color: var(--gold); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        /* 数据指标行 */
        .research-metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: auto; }
        .research-metric {
            background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            border-radius: 8px; padding: 8px 10px; text-align: center;
        }
        .research-metric-val { font-size: 15px; font-weight: 700; }
        .research-metric-val.up { color: var(--green); }
        .research-metric-val.down { color: var(--red); }
        .research-metric-label { font-size: 10px; color: var(--text-secondary); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }

        /* 研报底部操作栏 */
        .research-footer {
            border-top: 1px solid var(--border); padding: 12px 22px;
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(0,0,0,0.2);
        }
        .research-links { display: flex; gap: 12px; }
        .research-link-btn {
            display: inline-flex; align-items: center; gap: 4px;
            font-size: 12px; color: var(--accent); padding: 5px 12px;
            border-radius: 6px; background: rgba(88,166,255,0.08);
            border: 1px solid rgba(88,166,255,0.15); transition: all 0.2s;
        }
        .research-link-btn:hover { background: rgba(88,166,255,0.18); text-decoration: none; color: var(--accent); }

        /* ════════════════ 全景看板（带SVG走势图）════════════════ */
        .overview-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
        .overview-card {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
            padding: 0; overflow: hidden; transition: all 0.2s;
        }
        .overview-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(88,166,255,0.1); }

        /* 迷你 SVG 走势图 */
        .overview-sparkline {
            height: 70px; background: linear-gradient(180deg, rgba(88,166,255,0.03) 0%, transparent 100%);
            display: flex; align-items: flex-end; justify-content: center; padding: 6px 8px 4px;
        }
        .overview-sparkline svg { width: 100%; height: 100%; }

        .overview-info { padding: 12px 14px; }
        .overview-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
        .overview-ticker { font-size: 17px; font-weight: 700; color: var(--gold); letter-spacing: 1px; }
        .overview-name { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }
        .overview-price { text-align: right; }
        .overview-price-val { font-size: 16px; font-weight: 600; }
        .overview-change { font-size: 11px; margin-top: 1px; font-weight: 600; }
        .overview-change.up { color: var(--green); }
        .overview-change.down { color: var(--red); }
        .overview-stars { font-size: 13px; margin: 6px 0 4px; }
        .overview-status { margin-top: 6px; }

        /* ═══════════════ 九宫格热力图（改进版）═══════════════ */
        .heatmap-section { margin-top: 48px; }
        .heatmap-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
        .heatmap-legend { display: flex; gap: 12px; font-size: 12px; color: var(--text-secondary); }
        .heatmap-legend-item { display: flex; align-items: center; gap: 4px; }
        .heatmap-legend-color { width: 14px; height: 14px; border-radius: 3px; }
        
        /* 3x3热力图网格 */
        .heatmap-grid {
            display: grid; 
            grid-template-columns: 100px repeat(3, 1fr); 
            grid-template-rows: 40px repeat(3, 160px);
            gap: 2px; 
            background: var(--border); 
            border: 2px solid var(--border); 
            border-radius: 10px; 
            overflow: hidden;
        }
        
        /* 表头单元格 */
        .heatmap-header-cell {
            background: var(--bg-secondary); 
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-size: 13px; 
            font-weight: 600; 
            color: var(--text-secondary); 
            padding: 4px;
        }
        
        .heatmap-header-cell.risk-label {
            justify-content: flex-start;
            padding-left: 12px;
        }
        
        /* 数据单元格 */
        .heatmap-cell { 
            padding: 10px; 
            display: flex; 
            flex-direction: column; 
            transition: all 0.2s; 
            position: relative; 
            overflow: hidden;
        }
        
        .heatmap-cell:hover { 
            z-index: 10; 
            box-shadow: 0 0 20px rgba(88,166,255,0.4); 
            transform: scale(1.02);
        }
        
        .heatmap-cell-content { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 6px; 
            flex: 1; 
            align-content: flex-start; 
            overflow-y: auto;
        }
        
        /* 标的代码卡片（带sparkline+指标） */
        .hm-card {
            display: flex;
            flex-direction: column;
            background: rgba(0,0,0,0.35);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            padding: 6px 8px 5px;
            text-decoration: none;
            color: #e6edf3;
            transition: all 0.2s;
            min-width: 90px;
            cursor: pointer;
        }
        .hm-card:hover {
            background: rgba(88,166,255,0.15);
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
        }
        .hm-card-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3px;
        }
        .hm-ticker {
            font-size: 12px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.3px;
        }
        .hm-chg {
            font-size: 11px;
            font-weight: 600;
        }
        .hm-spark {
            margin: 2px 0 3px;
            border-radius: 3px;
            overflow: hidden;
            line-height: 0;
        }
        .hm-meta {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: rgba(255,255,255,0.5);
        }
        
        /* 空单元格 */
        .heatmap-empty {
            color: rgba(255,255,255,0.2);
            font-size: 24px;
            line-height: 1;
        }
        
        /* 最佳买点 & 危险区高亮 */
        .heatmap-best { 
            box-shadow: 0 0 0 3px var(--green) inset; 
            animation: bestPulse 2s ease-in-out infinite;
        }
        
        .heatmap-danger { 
            box-shadow: 0 0 0 3px var(--red) inset; 
        }
        
        @keyframes bestPulse {
            0%, 100% { box-shadow: 0 0 0 3px var(--green) inset; }
            50% { box-shadow: 0 0 0 5px var(--green) inset, 0 0 15px rgba(63,185,80,0.3); }
        }
        .heatmap-danger { box-shadow: 0 0 0 2px var(--red) inset; }

        /* ════════════════ 均线状态灯 ════════════════ */
        .ma-table-wrap { overflow-x: auto; margin-top: 20px; }
        .ma-table { width: 100%; border-collapse: collapse; font-size: 14px; }
        .ma-table th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-secondary); padding: 10px 12px; border-bottom: 2px solid var(--border); background: rgba(255,255,255,0.02); }
        .ma-table td { padding: 10px 12px; border-bottom: 1px solid rgba(48,54,61,0.5); }
        .ma-table tr:hover td { background: rgba(255,255,255,0.03); }
        .ma-table .num { text-align: right; font-variant-numeric: tabular-nums; }
        .ma-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
        .ma-dot.green { background: var(--green); }
        .ma-dot.red { background: var(--red); }
        .ma-dot.gray { background: var(--text-secondary); }

        /* ════════════════ 响应式 ════════════════ */
        @media (max-width: 1200px) { .overview-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 900px) {
            .research-grid { grid-template-columns: 1fr; }
            .overview-grid { grid-template-columns: repeat(2, 1fr); }
            .heatmap-grid { grid-template-columns: 80px repeat(3, 1fr); }
        }
        @media (max-width: 600px) {
            .hero h1 { font-size: 28px; }
            .overview-grid { grid-template-columns: 1fr; }
            .heatmap-grid { grid-template-columns: 60px repeat(3, 1fr); grid-template-rows: 36px repeat(3, 90px); }
        }

        /* ═══ 页脚 ═══ */
        footer { background: var(--bg-secondary); border-top: 1px solid var(--border); padding: 24px; text-align: center; font-size: 13px; color: var(--text-secondary); }
        footer a { color: var(--text-secondary); margin: 0 8px; }
    </style>
</head>

    // ═══ SVG 迷你走势图生成器 ═══
    function buildSparklineSVG(prices, w=280, h=130, color='#58a6ff', fillOpacity=0.12) {
        if (!prices || prices.length < 2) return `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg"><text x="${w/2}" y="${h/2}" text-anchor="middle" fill="#555" font-size="12">暂无数据</text></svg>`;
        const min = Math.min(...prices), max = Math.max(...prices);
        const range = max - min || 1;
        const pad = 8;
        const pts = prices.map((p,i) => {
            const x = pad + (i/(prices.length-1))*(w-2*pad);
            const y = h-pad-((p-min)/range)*(h-2*pad);
            return `${x},${y}`;
        }).join(' ');
        const areaPts = `${pad},${h-pad} ${pts} ${w-pad},${h-pad}`;
        const lastPrice = prices[prices.length-1];
        const firstPrice = prices[0];
        const chgPct = ((lastPrice-firstPrice)/firstPrice*100).toFixed(2);
        const lineColor = lastPrice >= firstPrice ? '#3fb950' : '#f85149';
        const fillColor = lastPrice >= firstPrice ? 'rgba(63,185,80,'+fillOpacity+')' : 'rgba(248,81,73,'+fillOpacity+')';
        return `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
            <defs><linearGradient id="grad-${Math.random().toString(36).substr(2,6)}" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="${fillColor}"/><stop offset="100%" stop-color="${fillColor.replace(fillOpacity,'0')}"/></linearGradient></defs>
            <polygon points="${areaPts}" fill="${fillColor}" />
            <polyline points="${pts}" fill="none" stroke="${lineColor}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="${pad+(prices.length-1)/(prices.length-1)*(w-2*pad)}" cy="${h-pad-((lastPrice-min)/range)*(h-2*pad)}" r="3.5" fill="${lineColor}" stroke="#0d1117" stroke-width="1.5"/>
            <text x="${w-4}" y="14" text-anchor="end" fill="${lineColor}" font-size="11" font-weight="600">${chgPct>0?'+':''}${chgPct}%</text>
        </svg>`;
    }

    // ═══ 小型 Sparkline (用于 Overview 卡片) ═══
    function buildMiniSpark(prices, w=200, h=60) {
        if (!prices || prices.length < 2) return '';
        const min=Math.min(...prices), max=Math.max(...prices), range=max-min||1;
        const p=4;
        const pts=prices.map((v,i)=>{const x=p+(i/(prices.length-1))*(w-2*p);const y=h-p-((v-min)/range)*(h-2*p);return`${x},${y}`}).join(' ');
        const lc=prices[prices.length-1]>=prices[0]?'#3fb950':'#f85149';
        return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><polyline points="${pts}" fill="none" stroke="${lc}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    }

            const price = safeNum(o.latest_close);
            const history = (o.price_history || []).map(p => p.close);
            const miniSpark = buildMiniSpark(history, 200, 60);
            const links = getLinks(t);
            const ms = o.ma_status || '中性';
            return `
            <a href="/${t.toLowerCase()}/" style="text-decoration:none;color:inherit;display:block;">
                <div class="overview-sparkline">${miniSpark||'<div style="color:#333;font-size:10px;padding-top:24px;">--</div>'}</div>
                <div class="overview-info">
                    <div class="overview-header">
                        <div><div class="overview-ticker">${t}</div><div class="overview-name">${safeStr(o.name)}</div></div>
                        <div class="overview-price"><div class="overview-price-val">$${price.toFixed(2)}</div><div class="overview-change ${chgCls}">${chg>=0?'+':''}${chg.toFixed(2)}%</div></div>
                    </div>
                    <div class="overview-stars">${'⭐'.repeat(stars)}${'☆'.repeat(5-stars)}</div>
                    <div class="overview-status">${statusBadge(ms)}</div>
                </div>
            </a>`;
        }).join('');
    }

    // ═══ 渲染：均线表 ═══
    function renderMATable() {
        const sec=document.getElementById('ma-section'), tbody=document.getElementById('ma-tbody');
        const valid=OVERVIEW.filter(o=>o.ma20&&o.ma50&&o.ma200);
        if(valid.length===0){sec.style.display='none';return;}
        sec.style.display='block';
        tbody.innerHTML=valid.map(o=>{
            const dot=v=>o.latest_close>v?'<span class="ma-dot green"></span>':'<span class="ma-dot red"></span>';
            const l=getLinks(o.ticker);
            return `<tr><td><a href="${l.tradingview}" target="_blank" style="font-weight:600;color:var(--gold);">${o.ticker} ↗</a></td><td>${o.name}</td><td class="num">$${o.latest_close.toFixed(2)}</td><td class="num">${dot(o.ma20)} $${o.ma20.toFixed(2)}</td><td class="num">${dot(o.ma50)} $${o.ma50.toFixed(2)}</td><td class="num">${dot(o.ma200)} $${o.ma200.toFixed(2)}</td><td>${statusBadge(o.ma_status)}</td><td class="num" style="font-weight:700;">${o.score?o.score.toFixed(0):'-'}</td></tr>`;
        }).join('');
    }

    // ═══ 启动 ═══
    function safeRender(fn,name){try{fn();}catch(e){console.error(`[${name}]`,e);}}
    safeRender(renderResearch, 'renderResearch');
    safeRender(renderOverview, 'renderOverview');
    safeRender(renderMATable, 'renderMATable');
    </script>
</body>
</html>
