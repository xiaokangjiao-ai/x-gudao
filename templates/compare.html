<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基金对比 | 全球最具价值的10个基金</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg-primary: #0d1117; --bg-secondary: #161b22; --bg-card: #1c2128; --border: #30363d; --text-primary: #e6edf3; --text-secondary: #8b949e; --accent: #58a6ff; --green: #3fb950; --red: #f85149; --gold: #d4a843; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); }
        a { color: var(--accent); text-decoration: none; }
        header { background: var(--bg-secondary); border-bottom: 1px solid var(--border); padding: 0 24px; position: sticky; top: 0; z-index: 100; }
        .header-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 56px; }
        .logo { font-size: 18px; font-weight: 700; }
        .logo span { color: var(--gold); }
        nav { display: flex; gap: 24px; }
        nav a { color: var(--text-secondary); font-size: 14px; font-weight: 500; }
        nav a:hover, nav a.active { color: var(--text-primary); text-decoration: none; }
        nav a.active { border-bottom: 2px solid var(--gold); padding-bottom: 2px; }
        .main { max-width: 1200px; margin: 0 auto; padding: 32px 24px 80px; }
        h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
        .subtitle { color: var(--text-secondary); font-size: 15px; margin-bottom: 32px; }
        .selector { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
        .sel-btn { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-secondary); padding: 6px 14px; border-radius: 6px; font-size: 13px; cursor: pointer; transition: all 0.2s; }
        .sel-btn:hover { border-color: var(--accent); color: var(--accent); }
        .sel-btn.selected { background: var(--accent); border-color: var(--accent); color: #fff; }
        .chart-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 24px; }
        .chart-title { font-size: 15px; font-weight: 600; margin-bottom: 16px; }
        #compare-chart { width: 100%; height: 350px; }
        .perf-table { width: 100%; border-collapse: collapse; font-size: 14px; }
        .perf-table th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-secondary); padding: 8px 10px; border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.02); }
        .perf-table td { padding: 8px 10px; border-bottom: 1px solid rgba(48,54,61,0.5); }
        .perf-table tr:hover td { background: rgba(255,255,255,0.03); }
        .perf-table .num { text-align: right; font-variant-numeric: tabular-nums; }
        .perf-table .best { color: var(--gold); font-weight: 700; }
        .perf-table .ticker { font-weight: 600; color: var(--gold); }
        footer { background: var(--bg-secondary); border-top: 1px solid var(--border); padding: 24px; text-align: center; font-size: 13px; color: var(--text-secondary); }
    </style>
</head>
<body>
    <header>
        <div class="header-inner">
            <div class="logo">📈 <span>股道奇货</span> · 全球最具价值的10个基金</div>
            <nav>
                <a href="/">首页</a>
                <a href="/screener.html">基金列表</a>
                <a href="/compare.html" class="active">对比</a>
                <a href="/about.html">关于</a>
            </nav>
            <div style="margin-left:16px;padding:6px 14px;background:rgba(248,81,73,0.08);border:1px solid rgba(248,81,73,0.25);border-radius:8px;font-size:12px;color:#f87171;font-weight:500;">⚠️ 所有观点仅供参考，风险自担</div>
        </div>
    </header>
    <div class="main">
        <h1>⚖️ 基金对比分析</h1>
        <p class="subtitle">选择多个基金，一键生成收益率、波动率、相关性等多维度对比图表</p>
        <div class="selector" id="selector"></div>
        <div class="chart-card">
            <div class="chart-title">📈 累计收益率对比（归一化起点=100）</div>
            <div id="compare-chart"></div>
        </div>
        <div class="chart-card">
            <div class="chart-title">📊 关键指标对比</div>
            <table class="perf-table" id="perf-table"></table>
        </div>
    </div>
    <footer>
        <p>数据来源：Yahoo Finance · 仅供参考，不构成投资建议</p>
    </footer>
    <script>
    const ALL_DATA = {{ all_data | safe }};
    const SELECTED = ['SPY', 'QQQ', 'VOO', 'VTI', 'VEA'];
    const COLORS = ['#58a6ff', '#f0883e', '#a371f7', '#3fb950', '#d2a8ff', '#ff7b72', '#79c0ff', '#ffd700', '#56d364', '#ff6b6b'];
    let active = [...SELECTED];

    function renderSelector() {
        const el = document.getElementById('selector');
        el.innerHTML = ALL_DATA.map(f =>
            `<button class="sel-btn ${active.includes(f.ticker) ? 'selected' : ''}" data-ticker="${f.ticker}">${f.ticker}</button>`
        ).join('');
        el.querySelectorAll('.sel-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (btn.classList.contains('selected')) {
                    if (active.length > 1) active = active.filter(t => t !== btn.dataset.ticker);
                } else {
                    if (active.length < 6) active.push(btn.dataset.ticker);
                }
                renderSelector();
                drawChart();
                renderTable();
            });
        });
    }

    function normalize(data) {
        if (!data.length) return [];
        const base = data[0].close;
        return data.map(d => [d.date, Math.round(d.close / base * 10000) / 100]);
    }

    let chart;
    function drawChart() {
        if (!chart) chart = echarts.init(document.getElementById('compare-chart'));
        const series = active.map((ticker, i) => {
            const fund = ALL_DATA.find(f => f.ticker === ticker);
            return {
                name: ticker,
                type: 'line',
                data: normalize(fund.data),
                smooth: true,
                symbol: 'none',
                lineStyle: { width: 2, color: COLORS[i % COLORS.length] }
            };
        });
        chart.setOption({
            backgroundColor: 'transparent',
            tooltip: { trigger: 'axis', formatter: p => p.map(item => `<strong>${item.axisValue}</strong><br/>${item.marker} ${item.seriesName}: ${item.value[1]}`).join('<br/>') },
            legend: { top: 0, textStyle: { color: '#8b949e' } },
            grid: { left: '1%', right: '1%', bottom: '10%', top: '15%', containLabel: true },
            xAxis: { type: 'category', axisLine: { lineStyle: { color: '#30363d' } }, axisLabel: { color: '#8b949e', fontSize: 11 } },
            yAxis: { type: 'value', scale: true, splitLine: { lineStyle: { color: '#21262d' } }, axisLabel: { color: '#8b949e', formatter: v => v } },
            dataZoom: [{ type: 'inside' }, { type: 'slider', height: 20, bottom: 0, borderColor: '#30363d', backgroundColor: '#161b22', fillerColor: 'rgba(88,166,255,0.2)', handleStyle: { color: '#58a6ff' }, textStyle: { color: '#8b949e' } }],
            series
        });
    }

    function renderTable() {
        const tbody = document.getElementById('perf-table');
        const best = { ret: null, vol: null, sharpe: null };
        active.forEach(ticker => {
            const f = ALL_DATA.find(x => x.ticker === ticker);
            if (best.ret === null || f.annual_return > best.ret) best.ret = f.annual_return;
            if (best.vol === null || f.volatility < best.vol) best.vol = f.volatility;
        });
        tbody.innerHTML = `<tr><th>基金</th><th>名称</th><th class="num">年化收益</th><th class="num">年化波动率</th><th class="num">最大回撤</th><th class="num">夏普比率</th><th class="num">最新价</th></tr>` +
            active.map((ticker, i) => {
                const f = ALL_DATA.find(x => x.ticker === ticker);
                return `<tr><td class="ticker" style="color:${COLORS[i % COLORS.length]}">${f.ticker}</td><td>${f.name}</td><td class="num ${f.annual_return === best.ret ? 'best' : ''}" style="color:${f.annual_return >= 0 ? 'var(--green)' : 'var(--red)'}">${f.annual_return >= 0 ? '+' : ''}${f.annual_return.toFixed(2)}%</td><td class="num ${f.volatility === best.vol ? 'best' : ''}">${f.volatility.toFixed(2)}%</td><td class="num" style="color:var(--red)">${f.max_drawdown.toFixed(2)}%</td><td class="num">${f.sharpe.toFixed(2)}</td><td class="num">$${f.latest_close.toFixed(2)}</td></tr>`;
            }).join('');
    }

    renderSelector();
    drawChart();
    renderTable();
    window.addEventListener('resize', () => chart && chart.resize());
    </script>
</body>
</html>
