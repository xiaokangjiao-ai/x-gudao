<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球最具投资价值的10个ETF + 10个股票 | 股道奇货</title>
    <meta name="description" content="精选全球规模最大、最具投资价值的10只ETF基金和10只顶级股票，提供K线图、技术指标、历史数据等专业金融分析。">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0d1117; --bg-secondary: #161b22; --bg-card: #1c2128;
            --border: #30363d; --text-primary: #e6edf3; --text-secondary: #8b949e;
            --accent: #58a6ff; --green: #3fb950; --red: #f85149; --gold: #d4a843;
        }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg-primary); color: var(--text-primary); line-height: 1.6; }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }

        header { background: var(--bg-secondary); border-bottom: 1px solid var(--border); padding: 0 24px; position: sticky; top: 0; z-index: 100; }
        .header-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 56px; }
        .logo { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .logo span { color: var(--gold); }
        nav { display: flex; gap: 24px; }

        .hero { text-align: center; padding: 60px 24px 36px; background: linear-gradient(180deg, rgba(88,166,255,0.06) 0%, transparent 100%); }
        .hero h1 { font-size: 42px; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.5px; }
        .hero h1 span { color: var(--gold); }
        .hero .subtitle { font-size: 28px; font-weight: 700; color: var(--text-primary); margin-bottom: 12px; }
        .hero p { font-size: 15px; color: var(--text-secondary); max-width: 640px; margin: 0 auto; }

        .main { max-width: 1200px; margin: 0 auto; padding: 0 24px 60px; }

        .section-divider { display: flex; align-items: center; gap: 16px; margin: 40px 0 20px; }
        .section-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
        .section-title { font-size: 24px; font-weight: 700; white-space: nowrap; }
        .section-title .badge { display: inline-block; font-size: 12px; font-weight: 600; padding: 2px 10px; border-radius: 10px; margin-left: 8px; vertical-align: middle; }
        .badge-etf { background: rgba(88,166,255,0.15); color: var(--accent); border: 1px solid rgba(88,166,255,0.3); }
        .badge-stock { background: rgba(212,168,67,0.15); color: var(--gold); border: 1px solid rgba(212,168,67,0.3); }

        .fund-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
        .fund-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; transition: border-color 0.2s, transform 0.2s; cursor: pointer; display: block; color: inherit; }
        .fund-card:hover { border-color: var(--accent); transform: translateY(-2px); text-decoration: none; color: inherit; }
        .fund-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .fund-ticker { font-size: 22px; font-weight: 700; color: var(--gold); letter-spacing: 1px; }
        .fund-name { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
        .fund-price { font-size: 20px; font-weight: 600; text-align: right; }
        .fund-change { font-size: 13px; text-align: right; }
        .fund-change.up { color: var(--green); }
        .fund-change.down { color: var(--red); }
        .fund-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.5; margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .fund-metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; border-top: 1px solid var(--border); padding-top: 10px; }
        .metric { text-align: center; }
        .metric-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-secondary); }
        .metric-value { font-size: 14px; font-weight: 600; margin-top: 2px; }
        .mini-chart { height: 48px; margin: 8px 0 0; }
        .fund-tag { display: inline-block; border-radius: 4px; padding: 2px 8px; font-size: 11px; margin-bottom: 6px; }
        .fund-tag.etf { background: rgba(88,166,255,0.1); border: 1px solid rgba(88,166,255,0.2); color: var(--accent); }
        .fund-tag.stock { background: rgba(212,168,67,0.1); border: 1px solid rgba(212,168,67,0.2); color: var(--gold); }

        footer { background: var(--bg-secondary); border-top: 1px solid var(--border); padding: 32px 24px; text-align: center; font-size: 13px; color: var(--text-secondary); }
    </style>
</head>
<body>
    <header>
        <div class="header-inner">
            <div class="logo">📈 <span>股道奇货</span></div>
            <nav>
                <a href="/" style="color:var(--text-primary);font-weight:600;">首页</a>
                <a href="/screener.html">全部列表</a>
            </nav>
        </div>
    </header>

    <div class="hero">
        <h1>全球<span>最具投资价值</span> TOP 20</h1>
        <p>精选全球规模最大、最受关注的10只ETF和10只股票<br>每个标的独立深度分析页面，含K线图、技术指标、历史数据</p>
    </div>

    <div class="main">
        <!-- ===== ETF 板块 ===== -->
        <div class="section-divider">
            <div class="section-title">
                📊 全球最具投资价值的10个ETF
                <span class="badge badge-etf">ETF</span>
            </div>
        </div>
        <div class="fund-grid" id="etf-grid"></div>

        <!-- ===== 股票板块 ===== -->
        <div class="section-divider">
            <div class="section-title">
                🏢 全球最具投资价值的10个股票
                <span class="badge badge-stock">股票</span>
            </div>
        </div>
        <div class="fund-grid" id="stock-grid"></div>
    </div>

    <footer>
        <p>数据来源：Yahoo Finance · 仅供参考，不构成投资建议</p>
        <p style="margin-top:8px;">© 2026 <strong>股道奇货</strong> · x.gudaoqihuo.com</p>
    </footer>

    <script>
    const ETF_DATA = {{ etf_data | safe }};
    const STOCK_DATA = {{ stock_data | safe }};

    function renderGrid(data, containerId) {
        const grid = document.getElementById(containerId);
        const isEtf = containerId === 'etf-grid';
        grid.innerHTML = data.map(f => `
            <a class="fund-card" href="/${f.ticker.toLowerCase()}/">
                <div class="fund-card-top">
                    <div>
                        <span class="fund-tag ${isEtf ? 'etf' : 'stock'}">${isEtf ? 'ETF' : '股票'}</span>
                        <div class="fund-ticker">${f.ticker}</div>
                        <div class="fund-name">${f.name}</div>
                    </div>
                    <div>
                        <div class="fund-price">$${f.latest_close.toFixed(2)}</div>
                        <div class="fund-change ${f.change_pct >= 0 ? 'up' : 'down'}">${f.change_pct >= 0 ? '▲ +' : '▼ '}${f.change_pct.toFixed(2)}%</div>
                    </div>
                </div>
                <div class="fund-desc">${f.desc}</div>
                <div class="fund-metrics">
                    <div class="metric"><div class="metric-label">年化收益</div><div class="metric-value" style="color:${f.annual_return >= 0 ? 'var(--green)' : 'var(--red)'}">${f.annual_return >= 0 ? '+' : ''}${f.annual_return.toFixed(1)}%</div></div>
                    <div class="metric"><div class="metric-label">52周高</div><div class="metric-value">$${f.high.toFixed(0)}</div></div>
                    <div class="metric"><div class="metric-label">52周低</div><div class="metric-value">$${f.low.toFixed(0)}</div></div>
                </div>
                <div class="mini-chart" id="mini-${f.ticker}"></div>
            </a>
        `).join('');
    }

    function drawMini(data) {
        data.forEach(f => {
            const el = document.getElementById('mini-' + f.ticker);
            if (!el || !f.price_history || f.price_history.length === 0) return;
            const chart = echarts.init(el);
            const prices = f.price_history.map(p => p.close);
            const min = Math.min(...prices), max = Math.max(...prices);
            const up = (f.change_pct || 0) >= 0;
            chart.setOption({
                backgroundColor: 'transparent',
                grid: { left: 0, right: 0, top: 2, bottom: 0 },
                xAxis: { type: 'category', show: false, data: f.price_history.map(p => p.date) },
                yAxis: { type: 'value', show: false, min, max },
                series: [{
                    type: 'line', data: prices, smooth: true, symbol: 'none',
                    lineStyle: { width: 1.5, color: up ? '#3fb950' : '#f85149' },
                    areaStyle: { color: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1,
                        colorStops: [{ offset: 0, color: up ? 'rgba(63,185,80,0.2)' : 'rgba(248,81,73,0.2)' }, { offset: 1, color: 'transparent' }] } }
                }]
            });
        });
    }

    renderGrid(ETF_DATA, 'etf-grid');
    renderGrid(STOCK_DATA, 'stock-grid');
    setTimeout(() => { drawMini(ETF_DATA); drawMini(STOCK_DATA); }, 100);
    window.addEventListener('resize', () => { drawMini(ETF_DATA); drawMini(STOCK_DATA); });
    </script>
</body>
</html>
