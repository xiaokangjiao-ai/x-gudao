<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球最具投资价值的8个ETF + 8个股票 | 股道奇货</title>
    <meta name="description" content="精选全球规模最大、最具投资价值的8只ETF基金和8只顶级股票，提供K线图、技术指标、历史数据等专业金融分析。">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0d1117; --bg-secondary: #161b22; --bg-card: #1c2128;
            --border: #30363d; --text-primary: #e6edf3; --text-secondary: #8b949e;
            --accent: #58a6ff;
            --green: #ef4444; --red: #22c55e;
            --gold: #d4a843;
        }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg-primary); color: var(--text-primary); line-height: 1.6; }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }

        header { background: var(--bg-secondary); border-bottom: 1px solid var(--border); padding: 0 24px; position: sticky; top: 0; z-index: 100; }
        .header-inner { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 56px; }
        .logo { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .logo span { color: var(--gold); }
        nav { display: flex; gap: 24px; }
        .lang-toggle { display: flex; gap: 4px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 3px 6px; }
        .lang-btn { font-size: 12px; padding: 2px 8px; border-radius: 14px; cursor: pointer; border: none; background: none; color: var(--text-secondary); font-weight: 600; transition: all 0.2s; }
        .lang-btn.active { background: var(--accent); color: #fff; }
        .lang-btn:hover { color: var(--text-primary); }

        .market-status { max-width: 1400px; margin: 12px auto 0; padding: 0 24px; }
        .market-status-bar { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; padding: 8px 16px; display: flex; align-items: center; gap: 12px; font-size: 13px; color: var(--text-secondary); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .status-dot.open { background: #22c55e; box-shadow: 0 0 6px rgba(34,197,94,0.6); }
        .status-dot.closed { background: #6b7280; }
        .status-dot.pre { background: #f59e0b; box-shadow: 0 0 6px rgba(245,158,11,0.4); }

        .main { max-width: 1400px; margin: 0 auto; padding: 16px 24px 40px; }
        .dual-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }

        .section-title { font-size: 20px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .section-title .badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 10px; border-radius: 10px; }
        .badge-etf { background: rgba(88,166,255,0.15); color: var(--accent); border: 1px solid rgba(88,166,255,0.3); }
        .badge-stock { background: rgba(212,168,67,0.15); color: var(--gold); border: 1px solid rgba(212,168,67,0.3); }

        .fund-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .fund-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; transition: all 0.25s ease; cursor: pointer; display: block; color: inherit; }
        .fund-card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 8px 16px rgba(0,0,0,0.25); text-decoration: none; color: inherit; }
        .fund-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .fund-ticker { font-size: 16px; font-weight: 700; color: var(--gold); letter-spacing: 0.5px; }
        .fund-name { font-size: 11px; color: var(--text-secondary); margin-top: 1px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; white-space: normal; max-width: 160px; line-height: 1.3; }
        .fund-price { font-size: 16px; font-weight: 600; text-align: right; }
        .fund-change { font-size: 16px; font-weight: 600; text-align: right; }
        .fund-change.up { color: var(--green); }
        .fund-change.down { color: var(--red); }
        .fund-desc { font-size: 11px; color: var(--text-secondary); line-height: 1.4; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .fund-metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; border-top: 1px solid var(--border); padding-top: 8px; }
        .metric { text-align: center; }
        .metric-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-secondary); }
        .metric-label.time-label { font-size: 9px; opacity: 0.8; }
        .metric-value { font-size: 12px; font-weight: 600; margin-top: 1px; color: #9ca3af; }
        .metric-value.color-dynamic { color: inherit; }
        .mini-chart { height: 40px; margin: 10px 0 0; padding-bottom: 2px; }

        footer { background: var(--bg-secondary); border-top: 1px solid var(--border); padding: 24px 24px; text-align: center; font-size: 12px; color: var(--text-secondary); }

        @media (max-width: 1024px) {
            .dual-columns { grid-template-columns: 1fr; gap: 24px; }
        }
        @media (max-width: 600px) {
            .fund-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-inner">
            <div class="logo">📈 <span>股道奇货</span></div>
            <nav>
                <a href="/" style="color:var(--text-primary);font-weight:600;" data-i18n="nav_home">首页</a>
                <a href="#etf-section" data-i18n="nav_etf">ETF</a>
                <a href="#stock-section" data-i18n="nav_stock">股票</a>
                <a href="/screener.html" data-i18n="nav_list">全部列表</a>
            </nav>
            <div class="lang-toggle">
                <button class="lang-btn active" id="lang-zh" onclick="setLang('zh')">🇨🇳</button>
                <button class="lang-btn" id="lang-en" onclick="setLang('en')">🇺🇸</button>
            </div>
        </div>
    </header>

    <div class="market-status">
        <div class="market-status-bar">
            <span class="status-dot" id="status-dot"></span>
            <span id="market-status-text" data-i18n="status_loading">加载中...</span>
            <span style="margin-left:auto;" id="update-time"></span>
        </div>
    </div>

    <div class="main">
        <div class="dual-columns">
            <!-- 左栏: ETF -->
            <div id="etf-section">
                <div class="section-title">
                    📊 <span data-i18n="etf_title">全球最具投资价值的8个ETF</span>
                    <span class="badge badge-etf" data-i18n="badge_etf">ETF</span>
                </div>
                <div class="fund-grid" id="etf-grid"></div>
            </div>
            <!-- 右栏: 股票 -->
            <div id="stock-section">
                <div class="section-title">
                    🏢 <span data-i18n="stock_title">全球最具投资价值的8个股票</span>
                    <span class="badge badge-stock" data-i18n="badge_stock">股票</span>
                </div>
                <div class="fund-grid" id="stock-grid"></div>
            </div>
        </div>
    </div>

    <footer>
        <p data-i18n="footer_disclaimer">数据来源：Yahoo Finance · 仅供参考，不构成投资建议</p>
        <p style="margin-top:6px;">© 2026 <strong data-i18n="footer_brand">股道奇货</strong> · x.gudaoqihuo.com</p>
    </footer>

    <script>
    const ETF_DATA = {{ etf_data | safe }};
    const STOCK_DATA = {{ stock_data | safe }};
    const LATEST_DATE = "{{ latest_date | safe }}";

    // ── i18n ──
    const I18N = {
        zh: {
            nav_home: '首页', nav_etf: 'ETF', nav_stock: '股票', nav_list: '全部列表',
            etf_title: '全球最具投资价值的8个ETF', stock_title: '全球最具投资价值的8个股票',
            badge_etf: 'ETF', badge_stock: '股票',
            status_loading: '加载中...',
            status_open: '🟢 美股实时交易中 (NYSE/NASDAQ)',
            status_after: '🟡 盘后交易中',
            status_pre: '🟡 盘前交易时段',
            status_close: '🔴 美股已收盘',
            status_weekend: '🔴 美股休市 (周末)',
            label_52w_high: '52周高', label_52w_low: '52周低',
            footer_disclaimer: '数据来源：Yahoo Finance · 仅供参考，不构成投资建议',
            footer_brand: '股道奇货',
            update_prefix: '数据更新: ',
        },
        en: {
            nav_home: 'Home', nav_etf: 'ETFs', nav_stock: 'Stocks', nav_list: 'All',
            etf_title: 'Top 8 Most Valuable ETFs to Invest Globally',
            stock_title: 'Top 8 Most Valuable Stocks to Invest Globally',
            badge_etf: 'ETF', badge_stock: 'STOCK',
            status_loading: 'Loading...',
            status_open: '🟢 US Markets Open (NYSE/NASDAQ)',
            status_after: '🟡 After-Hours Trading',
            status_pre: '🟡 Pre-Market Trading',
            status_close: '🔴 US Markets Closed',
            status_weekend: '🔴 US Markets Closed (Weekend)',
            label_52w_high: '52W High', label_52w_low: '52W Low',
            footer_disclaimer: 'Data: Yahoo Finance · For reference only · Not investment advice',
            footer_brand: 'Gudao Qihuo',
            update_prefix: 'Data: ',
        }
    };
    let CURRENT_LANG = localStorage.getItem('gq_lang') || 'zh';

    function setLang(lang) {
        CURRENT_LANG = lang;
        localStorage.setItem('gq_lang', lang);
        document.getElementById('lang-zh').classList.toggle('active', lang === 'zh');
        document.getElementById('lang-en').classList.toggle('active', lang === 'en');
        applyI18n(lang);
    }

    function applyI18n(lang) {
        const t = I18N[lang];
        // data-i18n attributes
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (t[key] !== undefined) el.textContent = t[key];
        });
        // class-based labels in JS-rendered cards
        document.querySelectorAll('.label-52w-high').forEach(el => { el.textContent = t.label_52w_high; });
        document.querySelectorAll('.label-52w-low').forEach(el => { el.textContent = t.label_52w_low; });
    }

    // ── 市场状态 ──
    (function() {
        const dot = document.getElementById('status-dot');
        const text = document.getElementById('market-status-text');
        const time = document.getElementById('update-time');
        if (LATEST_DATE) time.textContent = I18N[CURRENT_LANG].update_prefix + LATEST_DATE;

        const now = new Date();
        // 美东时间 = UTC-4(夏令) / UTC-5(冬)
        const isDST = isUSDaylightSaving(now);
        const nyHour = now.getUTCHours() - (isDST ? 4 : 5);
        let status;
        if (now.getUTCDay() >= 1 && now.getUTCDay() <= 5) {
            // 周一到周五
            const isHoliday = false; // TODO: holiday detection
            const t = I18N[CURRENT_LANG];
            if (nyHour >= 9.5 && nyHour < 16) {
                status = { cls: 'open', txt: t.status_open };
            } else if (nyHour >= 16 && nyHour < 20) {
                status = { cls: 'pre', txt: t.status_after };
            } else if (nyHour >= 4 && nyHour < 9.5) {
                status = { cls: 'pre', txt: t.status_pre };
            } else {
                status = { cls: 'closed', txt: t.status_close + (LATEST_DATE ? ' ' + LATEST_DATE : '') };
            }
        } else {
            status = { cls: 'closed', txt: t.status_weekend };
        }
        dot.className = 'status-dot ' + status.cls;
        text.textContent = status.txt;
    })();

    function isUSDaylightSaving(d) {
        const y = d.getUTCFullYear();
        // 3月第二个周日
        const mar = new Date(Date.UTC(y, 2, 1));
        mar.setUTCDate(mar.getUTCDate() + (7 - mar.getUTCDay()) % 7 + 7);
        // 11月第一个周日
        const nov = new Date(Date.UTC(y, 10, 1));
        nov.setUTCDate(nov.getUTCDate() + (7 - nov.getUTCDay()) % 7);
        return d >= mar && d < nov;
    }

    // ── 卡片渲染 ──
    function buildGridHTML(data) {
        return data.map(f => `
            <a class="fund-card" href="/${f.ticker.toLowerCase()}/">
                <div class="fund-card-top">
                    <div>
                        <div class="fund-ticker">${f.ticker}</div>
                        <div class="fund-name" title="${f.name}">${f.name}</div>
                    </div>
                    <div>
                        <div class="fund-price">$${f.latest_close.toFixed(2)}</div>
                        <div class="fund-change ${f.change_pct >= 0 ? 'up' : 'down'}">${f.change_pct >= 0 ? '+' : ''}${f.change_pct.toFixed(2)}%</div>
                    </div>
                </div>
                <div class="fund-desc">${f.desc}</div>
                <div class="fund-metrics">
                    <div class="metric"><div class="metric-label">YTD</div><div class="metric-value color-dynamic" style="color:${f.annual_return >= 0 ? 'var(--green)' : 'var(--red)'}">${f.annual_return >= 0 ? '+' : ''}${f.annual_return.toFixed(1)}%</div></div>
                    <div class="metric"><div class="metric-label label-52w-high">52W High</div><div class="metric-value">$${f.high.toFixed(0)}</div></div>
                    <div class="metric"><div class="metric-label label-52w-low">52W Low</div><div class="metric-value">$${f.low.toFixed(0)}</div></div>
                </div>
                <div class="mini-chart" id="mini-${f.ticker}"></div>
            </a>
        `).join('');
    }

    // ── 迷你走势图（红涨绿跌） ──
    function drawMini(data) {
        data.forEach(f => {
            const el = document.getElementById('mini-' + f.ticker);
            if (!el || !f.price_history || f.price_history.length === 0) return;
            const chart = echarts.init(el);
            const prices = f.price_history.map(p => p.close);
            const min = Math.min(...prices), max = Math.max(...prices);
            const up = (f.change_pct || 0) >= 0;
            // 红涨绿跌: up=红(#ef4444), down=绿(#22c55e)
            const lineColor = up ? '#ef4444' : '#22c55e';
            const areaTop = up ? 'rgba(239,68,68,0.25)' : 'rgba(34,197,94,0.25)';
            chart.setOption({
                backgroundColor: 'transparent',
                grid: { left: 0, right: 0, top: 2, bottom: 0 },
                xAxis: { type: 'category', show: false, data: f.price_history.map(p => p.date) },
                yAxis: { type: 'value', show: false, min, max },
                series: [{
                    type: 'line', data: prices, smooth: true, symbol: 'none',
                    lineStyle: { width: 1.5, color: lineColor },
                    areaStyle: { color: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1,
                        colorStops: [{ offset: 0, color: areaTop }, { offset: 1, color: 'transparent' }] } }
                }]
            });
        });
    }

    // ── 返回顶部按钮 ──
    (function() {
        const btn = document.createElement('a');
        btn.href = '#';
        btn.textContent = '⬆';
        btn.style.cssText = 'position:fixed;bottom:24px;right:24px;width:40px;height:40px;border-radius:50%;background:var(--bg-secondary);border:1px solid var(--border);color:var(--text-secondary);display:flex;align-items:center;justify-content:center;font-size:16px;text-decoration:none;opacity:0;transition:opacity 0.3s;z-index:99;cursor:pointer;';
        btn.title = '返回顶部';
        document.body.appendChild(btn);
        window.addEventListener('scroll', () => {
            btn.style.opacity = window.scrollY > 200 ? '1' : '0';
        });
        btn.addEventListener('click', (e) => {
            e.preventDefault();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    })();

    // ── 初始化 ──
    document.getElementById('etf-grid').innerHTML = buildGridHTML(ETF_DATA);
    document.getElementById('stock-grid').innerHTML = buildGridHTML(STOCK_DATA);
    setLang(CURRENT_LANG);
    setTimeout(() => { drawMini(ETF_DATA); drawMini(STOCK_DATA); }, 100);
    window.addEventListener('resize', () => { drawMini(ETF_DATA); drawMini(STOCK_DATA); });
    </script>
</body>
</html>
