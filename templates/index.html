<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每周深度研判 · 全球核心资产 | 股道奇货</title>

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0d1117; --bg-secondary: #161b22; --bg-card: #1c2128;
            --border: #30363d; --text-primary: #e6edf3; --text-secondary: #8b949e;
            --accent: #58a6ff; --green: #3fb950; --red: #f85149; --gold: #d4a843;
        }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg-primary); color: var(--text-primary); line-height: 1.6; }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }

        header { background: var(--bg-secondary); border-bottom: 1px solid var(--border); padding: 0 24px; position: sticky; top: 0; z-index: 100; }
        .header-inner { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; height: 56px; }
        .logo { font-size: 18px; font-weight: 700; }
        .logo span { color: var(--gold); }

        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 700; letter-spacing: 0.5px; white-space: nowrap; }
        .status-badge.bullish { background: #1a6b1a; color: #fff; }
        .status-badge.neutral-bull { background: #b8860b; color: #000; }
        .status-badge.neutral-bear { background: #d2691e; color: #fff; }
        .status-badge.bearish { background: #b22222; color: #fff; }

        .hero { text-align: center; padding: 50px 24px 30px; background: linear-gradient(180deg, rgba(212,168,67,0.08) 0%, transparent 100%); }
        .hero h1 { font-size: 38px; font-weight: 700; margin-bottom: 10px; letter-spacing: -0.5px; }
        .hero h1 span { color: var(--gold); }
        .hero-subtitle { font-size: 15px; color: var(--text-secondary); max-width: 700px; margin: 0 auto 24px; }

        /* ── 板块导航 ── */
        .sector-nav { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; padding: 0 24px; max-width: 1100px; margin: 0 auto; }
        .sector-btn {
            padding: 12px 24px; border-radius: 24px; background: var(--bg-card);
            border: 1px solid rgba(212,168,67,0.5); color: var(--text-primary);
            font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s;
            font-family: inherit; white-space: nowrap; user-select: none;
        }
        .sector-btn:hover { border-color: var(--gold); box-shadow: 0 0 16px rgba(212,168,67,0.25); background: rgba(212,168,67,0.06); }
        .sector-btn.active { background: rgba(212,168,67,0.15); border-color: var(--gold); color: var(--gold); box-shadow: 0 0 20px rgba(212,168,67,0.3); }

        /* ── 板块内容区 ── */
        .sector-content { max-width: 1400px; margin: 24px auto 0; padding: 0 24px 60px; }
        .sector-panel { display: none; animation: fadeIn 0.35s ease; }
        .sector-panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .section-label { font-size: 18px; font-weight: 600; margin-bottom: 18px; color: var(--gold); display: flex; align-items: center; gap: 8px; }

        /* ── 研报卡片 ── */
        .research-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
        .research-card { background: var(--bg-card); border: 1px solid rgba(212,168,67,0.35); border-radius: 16px; overflow: hidden; transition: all 0.3s; display: flex; flex-direction: column; }
        .research-card:hover { border-color: var(--gold); transform: translateY(-4px); box-shadow: 0 8px 32px rgba(212,168,67,0.15); }
        .research-chart-area { height: 140px; background: linear-gradient(135deg, #0d1117 0%, #161b22 100%); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .research-chart-area svg { width: 100%; height: 100%; }
        .research-body { padding: 20px 22px 18px; flex: 1; display: flex; flex-direction: column; }
        .research-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .research-ticker { font-size: 26px; font-weight: 700; color: var(--gold); letter-spacing: 1px; }
        .research-name { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
        .research-score-val { font-size: 28px; font-weight: 700; color: var(--gold); }
        .research-score-label { font-size: 11px; color: var(--text-secondary); }
        .research-stars { font-size: 16px; margin-bottom: 10px; letter-spacing: 2px; }
        .research-content { font-size: 13.5px; line-height: 1.75; color: var(--text-primary); margin-bottom: 14px; flex: 1; }
        .research-content strong { color: var(--gold); }
        .research-content em { color: var(--accent); font-style: normal; }
        .research-highlight { background: rgba(212,168,67,0.08); border-left: 3px solid var(--gold); padding: 10px 14px; border-radius: 0 8px 8px 0; margin: 10px 0; font-size: 13px; line-height: 1.65; }
        .research-highlight .hl-label { font-size: 11px; color: var(--gold); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .research-metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: auto; }
        .research-metric { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; text-align: center; }
        .research-metric-val { font-size: 15px; font-weight: 700; }
        .research-metric-val.up { color: var(--green); }
        .research-metric-val.down { color: var(--red); }
        .research-metric-label { font-size: 10px; color: var(--text-secondary); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
        .research-footer { border-top: 1px solid var(--border); padding: 12px 22px; display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.2); }
        .research-link-btn { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; color: var(--accent); padding: 5px 12px; border-radius: 6px; background: rgba(88,166,255,0.08); border: 1px solid rgba(88,166,255,0.15); transition: all 0.2s; }
        .research-link-btn:hover { background: rgba(88,166,255,0.18); text-decoration: none; color: var(--accent); }

        /* ── 响应式 ── */
        @media (max-width: 900px) { .research-grid { grid-template-columns: 1fr; } }
        @media (max-width: 600px) { .hero h1 { font-size: 26px; } .sector-btn { padding: 10px 16px; font-size: 13px; } }

        footer { background: var(--bg-secondary); border-top: 1px solid var(--border); padding: 24px; text-align: center; font-size: 13px; color: var(--text-secondary); }
        footer a { color: var(--text-secondary); margin: 0 8px; }
    </style>
</head>

    { id: 'chip',     label: '💻 半导体',          tickers: ['SMH', 'NVDA', 'AMD'] },

// 研报内容库
const REPORTS = {
    'NVDA': { title:'英伟达：AI 算力绝对垄断', summaryFn:d=>`当前股价 <strong>$${d.price.toFixed(2)}</strong>，周涨跌 <strong>${d.chg>=0?'+':''}${d.chg.toFixed(2)}%</strong>。NVDA 凭借 <em>H100/H200/B200 系列 GPU</em>，在 AI 训练芯片市场占据约 80%+ 份额，是这轮生成式 AI 浪潮最确定的受益者。`, analysisFn:d=>`年化回报率 <strong>${d.ret.toFixed(1)}%</strong>，波动率 <strong>${d.vol.toFixed(1)}%</strong>（${d.volLevel}）。近期运行区间 $${d.lo.toFixed(0)}-$${d.hi.toFixed(0)}，回撤 ${d.drawdown}%。Blackwell 架构芯片需求超预期，CoWoS 封装产能是核心瓶颈。`, viewFn:d=>`<em>AI 算力需求远未见顶</em>——2025-2026 年各大云厂商（微软/谷歌/亚马逊/Meta）资本支出持续创历史新高，直接拉动 GPU 订单。数据中心业务已超越游戏成为 NVDA 第一大收入来源，估值逻辑正在从「显卡公司」切换为「AI Infrastructure」。` },
    'AAPL': { title:'苹果：生态护城河+AI手机换机潮', summaryFn:d=>`当前股价 <strong>$${d.price.toFixed(2)}</strong>，周涨跌 <strong>${d.chg>=0?'+':''}${d.chg.toFixed(2)}%</strong>。Apple 凭借 <em>iOS 生态粘性 + 服务收入持续高增长</em>，是美股最具防御性的科技巨头之一。`, analysisFn:d=>`年化回报率 <strong>${d.ret.toFixed(1)}%</strong>，波动率 <strong>${d.vol.toFixed(1)}%</strong>（${d.volLevel}）。iPhone 16 系列搭载 Apple Intelligence，<strong>AI 手机换机潮</strong>有望在 2025-2026 年集中释放，成为业绩核心催化剂。`, viewFn:d=>`<em>服务收入（App Store/Apple TV+/iCloud）毛利率高达 70%+</em>，是 Apple 的「现金牛」。随着 AI 功能推动换机周期缩短，硬件收入也有望迎来复苏。当前估值处于历史中位数附近，长线具备配置价值。` },
    'MSFT': { title:'微软：Copilot AI 商业化领头羊', summaryFn:d=>`当前股价 <strong>$${d.price.toFixed(2)}</strong>，周涨跌 <strong>${d.chg>=0?'+':''}${d.chg.toFixed(2)}%</strong>。<em>Azure 云计算 + GitHub Copilot + Microsoft 365 Copilot</em> 三引擎驱动，微软是 AI 商业化落地最成功的科技巨头。`, analysisFn:d=>`年化回报率 <strong>${d.ret.toFixed(1)}%</strong>，波动率 <strong>${d.vol.toFixed(1)}%</strong>（${d.volLevel}）。Azure 市场份额稳步提升（vs 亚马逊 AWS），AI 需求驱动微软 CAPEX 创历史新高，OpenAI 深度绑定是独家优势。`, viewFn:d=>`<em>Microsoft 365 Copilot ARPU 提升逻辑清晰</em>，企业级 AI 渗透率仍处早期。2025 财年业绩指引持续上调，长期看好。风险点：AI 投入回报周期不确定，短期估值偏高。` },
    'GOOGL': { title:'谷歌：搜索+云+AI 一体化布局', summaryFn:d=>`当前股价 <strong>$${d.price.toFixed(2)}</strong>，周涨跌 <strong>${d.chg>=0?'+':''}${d.chg.toFixed(2)}%</strong>。Google 拥有 <em>搜索（90%+ 份额）+ GCP 云服务 + Gemini AI</em> 三位一体布局，广告业务稳健，AI 正在重塑竞争格局。`, analysisFn:d=>`年化回报率 <strong>${d.ret.toFixed(1)}%</strong>，波动率 <strong>${d.vol.toFixed(1)}%</strong>（${d.volLevel}）。Gemini 大模型正在整合进搜索、Workspace、Android 全产品线，YouTube 广告收入持续增长。`, viewFn:d=>`<em>GCP 增速领跑云市场</em>（AWS/Azure/Google Cloud 中增速最快），AI 差异化竞争在于自有算力+TPU芯片。长线价值被市场低估，Pandora's Box（反垄断风险）是主要风险。` },
    'AMZN': { title:'亚马逊：电商+AWS 双王炸', summaryFn:d=>`当前股价 <strong>$${d.price.toFixed(2)}</strong>，周涨跌 <strong>${d.chg>=0?'+':''}${d.chg.toFixed(2)}%</strong>。<em>AWS（全球最大公有云）+ 电商（FBA 生态）</em>，亚马逊是美股最稳健的成长股之一。`, analysisFn:d=>`年化回报率 <strong>${d.ret.toFixed(1)}%</strong>，波动率 <strong>${d.vol.toFixed(1)}%</strong>（${d.volLevel}）。AWS 利润触底反弹（2023年裁员降本），AI 工作负载驱动云需求复苏，广告业务成为新增长极。`, viewFn:d=>`<em>亚马逊的飞轮效应：更多卖家→更多商品→更多用户→更多数据→更精准推荐→更多广告收入</em>。AWS AI CapEx 爆发直接利好，2025 年估值具备吸引力。` },
    'META': { title:'Meta：AI+元宇宙双线并进', summaryFn:d=>`当前股价 <strong>$${d.price.toFixed(2)}</strong>，周涨跌 <strong>${d.chg>=0?'+':''}${d.chg.toFixed(2)}%</strong>。<em>Facebook/Instagram/Reels + Llama 大模型 + 元宇宙</em>，Meta 是全球社交广告的绝对王者。`, analysisFn:d=>`年化回报率 <strong>${d.ret.toFixed(1)}%</strong>，波动率 <strong>${d.vol.toFixed(1)}%</strong>（${d.volLevel}）。Reels 货币化率持续提升，AI 推荐引擎显著改善用户时长，Llama 开源生态加速商业化。`, viewFn:d=>`<em>Threads 月活超 2 亿，商业化加速</em>。AI 驱动广告 ROI 提升，2025 年有望继续超预期。风险：欧盟监管+元宇宙持续烧钱（但已大幅削减）。` },
    'LLY': { title:'礼来：GLP-1 双寡头之一', summaryFn:d=>`当前股价 <strong>$${d.price.toFixed(2)}</strong>，周涨跌 <strong>${d.chg>=0?'+':''}${d.chg.toFixed(2)}%</strong>。作为 <em>GLP-1 减肥/糖尿病双赛道绝对龙头</em>，礼来凭借 Zepbound® 和 Mounjaro® 双引擎驱动，2025-2026 年营收增速持续领跑。`, analysisFn:d=>`年化回报率 <strong>${d.ret.toFixed(1)}%</strong>，波动率 <strong>${d.vol.toFixed(1)}%</strong>（${d.volLevel}）。GLP-1 市场远未触顶——双寡头格局至少维持至 2028 年，估值偏高但成长性匹配。`, viewFn:d=>`<em>关键催化剂：Zepbound 减肥适应症扩展 + 口服版 GLP-1 + 中国区放量</em>。风险：估值PE 40x+，政策压力。适合高风险偏好长线持有。` },
    'BRK.B': { title:'伯克希尔：价值投资的永恒旗帜', summaryFn:d=>`当前股价 <strong>$${d.price.toFixed(2)}</strong>，周涨跌 <strong>${d.chg>=0?'+':''}${d.chg.toFixed(2)}%</strong>。<em>巴菲特执掌</em>，保险+投资双轮驱动，是穿越牛熊的终极防御型标的。`, analysisFn:d=>`年化回报率 <strong>${d.ret.toFixed(1)}%</strong>，波动率极低（<strong>${d.vol.toFixed(1)}%</strong>）。伯克希尔股价与经济周期低相关，手握超 1500 亿美元现金等待机会，是「下跌时最抗跌的股票」。`, viewFn:d=>`<em>巴菲特最新持仓：大幅加仓能源（日本五大商事）+ 西方石油+苹果持仓</em>。在当前高利率环境下，BRK.B 的保险浮存金业务反而受益。适合保守型投资者作为核心底仓。` },
    'BND': { title:'Vanguard 全市场债券 ETF', summaryFn:d=>`当前价格 <strong>$${d.price.toFixed(2)}</strong>，周涨跌 <strong>${d.chg>=0?'+':''}${d.chg.toFixed(2)}%</strong>。<em>美国综合债券市场</em>，是所有资产配置组合的「稳定器」。`, analysisFn:d=>`年化回报率 <strong>${d.ret.toFixed(1)}%</strong>，波动率仅 <strong>${d.vol.toFixed(1)}%</strong>（${d.volLevel}）。债券与股票相关性低，在美股高波动时期具备对冲价值。美联储降息预期下，债券价格有望反弹。`, viewFn:d=>`<em>BND 是组合的「压艙石」</em>——建议任何持仓组合中至少配置 10-20% 债券 ETF。当前债券收益率处于多年高点，长端利率下行趋势确立，债券已迎来战略性配置窗口。` },
    'VOO': { title:'Vanguard 标普 500 ETF', summaryFn:d=>`当前价格 <strong>$${d.price.toFixed(2)}</strong>，周涨跌 <strong>${d.chg>=0?'+':''}${d.chg.toFixed(2)}%</strong>。<em>美国大盘股核心指数</em>，代表 S&P 500，是全球被动投资首选。`, analysisFn:d=>`年化回报率 <strong>${d.ret.toFixed(1)}%</strong>，波动率 <strong>${d.vol.toFixed(1)}%</strong>。VOO 手续费率仅 0.03%/年，50年复利效应显著——相当于免费获取美国经济整体增长。`, viewFn:d=>`<em>标普500≈美国经济晴雨表</em>。长期定投 VOO 是普通人分享资本市场红利的最优解。当前估值处于历史中偏高，但优质资产值得持有。` },

    'AMD': { title:'AMD：GPU 第二极崛起', summaryFn:d=>`MI300X 异军突起，正在 NVIDIA 垄断的 AI 训练芯片市场撕开一道口子。`, analysisFn:d=>`年化回报率 <strong>${d.ret.toFixed(1)}%</strong>，波动率极高 <strong>${d.vol.toFixed(1)}%</strong>（${d.volLevel}）。AMD GPU 在推理市场已具备竞争力（成本优势），MI300X 出货量超预期。`, viewFn:d=>`<em>AMD 是 AI 芯片格局的「颠覆变量」</em>——若 MI350/MI400 系列追赶上 NVDA，估值重估空间巨大。但竞争不确定性也高，属于高风险高回报标的。` },
};

function safeNum(v, fb=0) { const n=Number(v); return isNaN(n)?fb:n; }
function safeStr(v) { return v===undefined||v===null?'':String(v); }
function safeStars(n) { const s=Math.round(safeNum(n,0)); return Math.max(0,Math.min(5,s)); }

function statusBadge(ms) {
    const m={
        "多头排列":'<span class="status-badge bullish">🟢 强劲牛市</span>',
        "偏多":'<span class="status-badge neutral-bull">🟡 震荡蓄势</span>',
        "中性":'<span class="status-badge neutral-bear">🟠 风险警示</span>',
        "偏空":'<span class="status-badge neutral-bear">🟠 风险警示</span>',
        "空头压制":'<span class="status-badge bearish">🔴 趋势走弱</span>',
    };
    return m[ms]||'<span class="status-badge neutral-bear">⚪ 未知</span>';
}

function buildSparklineSVG(prices, w=340, h=130) {
    if (!prices || prices.length < 2) return `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg"><text x="${w/2}" y="${h/2}" text-anchor="middle" fill="#555" font-size="12">暂无数据</text></svg>`;
    const min=Math.min(...prices), max=Math.max(...prices), range=max-min||1;
    const pad=8;
    const pts=prices.map((p,i)=>{const x=pad+(i/(prices.length-1))*(w-2*pad);const y=h-pad-((p-min)/range)*(h-2*pad);return`${x},${y}`}).join(' ');
    const areaPts=`${pad},${h-pad} ${pts} ${w-pad},${h-pad}`;
    const lastPrice=prices[prices.length-1], firstPrice=prices[0];
    const chgPct=((lastPrice-firstPrice)/firstPrice*100).toFixed(2);
    const lc=lastPrice>=firstPrice?'#3fb950':'#f85149';
    const fc=lastPrice>=firstPrice?'rgba(63,185,80,0.12)':'rgba(248,81,73,0.12)';
    return `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
        <defs><linearGradient id="gd" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="${fc}"/><stop offset="100%" stop-color="transparent"/></linearGradient></defs>
        <polygon points="${areaPts}" fill="url(#gd)"/>
        <polyline points="${pts}" fill="none" stroke="${lc}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="${pad+(prices.length-1)/(prices.length-1)*(w-2*pad)}" cy="${h-pad-((lastPrice-min)/range)*(h-2*pad)}" r="3.5" fill="${lc}" stroke="#0d1117" stroke-width="1.5"/>
        <text x="${w-4}" y="14" text-anchor="end" fill="${lc}" font-size="11" font-weight="600">${chgPct>0?'+':''}${chgPct}%</text>
    </svg>`;
}

function getReportData(ticker, o) {
    const price=safeNum(o.latest_close);
    const chg=safeNum(o.change_pct);
    const ret=safeNum(o.annual_return);
    const vol=safeNum(o.volatility);
    const score=safeNum(o.score);
    const stars=safeStars(o.stars);
    const dp=safeNum(o.data_points);
    const hi=safeNum(o.high), lo=safeNum(o.low);
    const history=(o.price_history||[]).map(p=>p.close);
    const drawdown=hi>lo?((hi-lo)/hi*100).toFixed(1):'0.0';
    const volLevel=vol>30?'极高':vol>25?'较高':vol>18?'适中':vol<12?'偏低':'正常';
    const rpt=REPORTS[ticker]||REPORTS[Object.keys(REPORTS)[0]];
    return {
        price,chg,ret,vol,score,stars,dp,hi,lo,drawdown,volLevel,history,
        title:rpt.title,
        summary:rpt.summaryFn({price,chg,ret,vol,volLevel,dp,hi,lo,drawdown,score,stars}),
        analysis:rpt.analysisFn({price,chg,ret,vol,volLevel,dp,hi,lo,drawdown,score,stars}),
        view:rpt.viewFn({price,chg,ret,vol,volLevel,dp,hi,lo,drawdown,score,stars}),
        verdict:score>=70?'🟢 核心持仓级':score>=50?'🟡 积极关注':'🔴 观望等待',
    };
}

function renderSectorPanel(sector) {
    const cards = sector.tickers.map(ticker => {
        const o = OVERVIEW.find(x=>x.ticker===ticker);
        if (!o) return '';
        const d = getReportData(ticker, o);
        const sparkSVG = buildSparklineSVG(d.history);
        const name = o.name || ticker;
        return `
        <div class="research-card">
            <div class="research-chart-area">${sparkSVG}</div>
            <div class="research-body">
                <div class="research-header">
                    <div>
                        <div class="research-ticker">${ticker}</div>
                        <div class="research-name">${d.title}</div>
                    </div>
                    <div style="text-align:right;">
                        <div class="research-score-val">${d.score.toFixed(0)}</div>
                        <div class="research-score-label">综合评分</div>
                    </div>
                </div>
                <div class="research-stars">${'⭐'.repeat(d.stars)}${'☆'.repeat(5-d.stars)}</div>
                <div class="research-content">
                    <p style="margin-bottom:8px;">${d.summary}</p>
                    <div class="research-highlight">
                        <div class="hl-label">📊 深度分析</div>
                        ${d.analysis}
                    </div>
                    <p style="margin-top:8px;"><strong>🎯 投资观点：</strong>${d.view}</p>
                </div>
                <div class="research-metrics">
                    <div class="research-metric"><div class="research-metric-val">$${d.price.toFixed(2)}</div><div class="research-metric-label">最新价</div></div>
                    <div class="research-metric"><div class="research-metric-val ${d.chg>=0?'up':'down'}">${d.chg>=0?'+':''}${d.chg.toFixed(2)}%</div><div class="research-metric-label">周涨跌</div></div>
                    <div class="research-metric"><div class="research-metric-val" style="color:var(--gold);">${d.drawdown}%</div><div class="research-metric-label">区间回撤</div></div>
                </div>
            </div>
            <div class="research-footer">
                <div style="font-size:12px;color:var(--text-secondary);font-weight:600;">${d.verdict}</div>
                <a class="research-link-btn" href="/${ticker.toLowerCase()}/">📋 详情 →</a>
            </div>
        </div>`;
    }).join('');
    return `<div class="section-label">${sector.label} · 本周精选</div><div class="research-grid">${cards}</div>`;
}

function initSectors() {
    const nav = document.getElementById('sector-nav');
    const content = document.getElementById('sector-content');

    // 渲染按钮
    nav.innerHTML = SECTORS.map(s =>
        `<button class="sector-btn" data-id="${s.id}">${s.label}</button>`
    ).join('');

    // 渲染内容面板
    content.innerHTML = SECTORS.map(s =>
        `<div class="sector-panel" id="panel-${s.id}">${renderSectorPanel(s)}</div>`
    ).join('');

    // 默认展开第一个板块
    let activeId = SECTORS[0].id;
    document.querySelector(`.sector-btn[data-id="${activeId}"]`).classList.add('active');
    document.getElementById(`panel-${activeId}`).classList.add('active');

    // 点击事件
    nav.addEventListener('click', e => {
        const btn = e.target.closest('.sector-btn');
        if (!btn) return;
        const id = btn.dataset.id;
        if (id === activeId) return;
        document.querySelectorAll('.sector-btn').forEach(b=>b.classList.remove('active'));
        document.querySelectorAll('.sector-panel').forEach(p=>p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(`panel-${id}`).classList.add('active');
        activeId = id;
    });
}

try { initSectors(); } catch(e) { console.error('[initSectors]', e); }
</script>
