<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球最具价值的10个基金 | 股道奇货</title>
    <meta name="description" content="专注全球规模最大、最具影响力的10只ETF基金，提供K线图、技术指标、基金对比等专业分析数据。">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0d1117; --bg-secondary: #161b22; --bg-card: #1c2128;
            --border: #30363d; --text-primary: #e6edf3; --text-secondary: #8b949e;
            --accent: #58a6ff; --green: #3fb950; --red: #f85149; --gold: #d4a843;
        }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg-primary); color: var(--text-primary); line-height: 1.6; }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }
        header { background: var(--bg-secondary); border-bottom: 1px solid var(--border); padding: 0 24px; position: sticky; top: 0; z-index: 100; }
        .header-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 56px; }
        .logo { font-size: 18px; font-weight: 700; }
        .logo span { color: var(--gold); }
        nav { display: flex; gap: 24px; }
        nav a { color: var(--text-secondary); font-size: 14px; font-weight: 500; }
        nav a:hover, nav a.active { color: var(--text-primary); text-decoration: none; }
        nav a.active { border-bottom: 2px solid var(--gold); padding-bottom: 2px; }

        .hero { text-align: center; padding: 80px 24px 48px; background: linear-gradient(180deg, rgba(88,166,255,0.06) 0%, transparent 100%); }
        .hero h1 { font-size: 40px; font-weight: 700; margin-bottom: 16px; letter-spacing: -0.5px; }
        .hero h1 span { color: var(--gold); }
        .hero p { font-size: 18px; color: var(--text-secondary); max-width: 600px; margin: 0 auto 32px; }
        .hero-tags { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .tag { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 6px 16px; font-size: 13px; color: var(--text-secondary); }

        .main { max-width: 1200px; margin: 0 auto; padding: 0 24px 80px; }
        .section-title { font-size: 20px; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }

        .fund-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
        .fund-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; transition: border-color 0.2s, transform 0.2s; cursor: pointer; }
        .fund-card:hover { border-color: var(--accent); transform: translateY(-2px); text-decoration: none; }
        .fund-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
        .fund-ticker { font-size: 22px; font-weight: 700; color: var(--gold); letter-spacing: 1px; }
        .fund-name { font-size: 14px; color: var(--text-secondary); margin-top: 2px; }
        .fund-price { font-size: 20px; font-weight: 600; text-align: right; }
        .fund-change { font-size: 13px; margin-top: 2px; text-align: right; }
        .fund-change.up { color: var(--green); }
        .fund-change.down { color: var(--red); }
        .fund-metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; border-top: 1px solid var(--border); padding-top: 12px; }
        .metric { text-align: center; }
        .metric-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-secondary); }
        .metric-value { font-size: 14px; font-weight: 600; margin-top: 2px; }
        .mini-chart { height: 60px; margin: 12px 0; }
        .fund-tag { display: inline-block; background: rgba(88,166,255,0.1); border: 1px solid rgba(88,166,255,0.2); border-radius: 4px; padding: 2px 8px; font-size: 11px; color: var(--accent); margin-bottom: 8px; }

        .compare-section { margin-top: 48px; }
        .compare-table-wrap { overflow-x: auto; }
        .compare-table { width: 100%; border-collapse: collapse; font-size: 14px; }
        .compare-table th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary); padding: 10px 12px; border-bottom: 2px solid var(--border); background: rgba(255,255,255,0.02); }
        .compare-table td { padding: 10px 12px; border-bottom: 1px solid rgba(48,54,61,0.5); }
        .compare-table tr:hover td { background: rgba(255,255,255,0.03); }
        .compare-table .num { text-align: right; font-variant-numeric: tabular-nums; }
        .compare-table .best { color: var(--gold); font-weight: 700; }
        .compare-table .ticker-link { font-weight: 600; color: var(--gold); }

        footer { background: var(--bg-secondary); border-top: 1px solid var(--border); padding: 32px 24px; text-align: center; font-size: 13px; color: var(--text-secondary); }
        footer a { color: var(--text-secondary); }
    </style>
</head>
<body>
    <header>
        <div class="header-inner">
            <div class="logo">📈 <span>股道奇货</span> · 全球最具价值的10个基金</div>
            <nav>
                <a href="/" class="active">首页</a>
                <a href="/screener.html">基金列表</a>
                <a href="/compare.html">对比</a>
                <a href="/about.html">关于</a>
            </nav>
        </div>
    </header>

    <div class="hero">
        <h1>全球<span>最具价值</span>的10个基金</h1>
        <p>专注全球规模最大、最具影响力的ETF基金，只选精品。<br>每个基金独立页面，含K线图、技术指标、专业对比数据。</p>
        <div class="hero-tags">
            <span class="tag">📊 5年历史数据</span>
            <span class="tag">📈 MA20 / MA50 / MA200</span>
            <span class="tag">⚖️ 基金对比分析</span>
            <span class="tag">🔄 每日自动更新</span>
        </div>
    </div>

    <div class="main">
        <div class="section-title">📋 全部基金</div>
        <div class="fund-grid" id="fund-grid"></div>

        <div class="compare-section">
            <div class="section-title">⚖️ 关键指标对比</div>
            <div class="compare-table-wrap">
                <table class="compare-table">
                    <thead>
                        <tr>
                            <th>基金</th>
                            <th>名称</th>
                            <th class="num">最新价</th>
                            <th class="num">52W高</th>
                            <th class="num">52W低</th>
                            <th class="num">年化收益</th>
                            <th class="num">波动率</th>
                            <th class="num">数据点</th>
                        </tr>
                    </thead>
                    <tbody id="compare-tbody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <footer>
        <p>数据来源：Yahoo Finance · 仅供参考，不构成投资建议</p>
        <p style="margin-top:8px;">© 2026 <a href="/">全球最具价值的10个基金</a> · x.gudaoqihuo.com</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script>
    const OVERVIEW = {{ overview_data | safe }};

    function renderGrid() {
        const grid = document.getElementById('fund-grid');
        grid.innerHTML = OVERVIEW.map(f => `
            <a class="fund-card" href="/${f.ticker.toLowerCase()}/">
                <div class="fund-card-top">
                    <div>
                        <div class="fund-tag">${f.category}</div>
                        <div class="fund-ticker">${f.ticker}</div>
                        <div class="fund-name">${f.name}</div>
                    </div>
                    <div>
                        <div class="fund-price">$${f.latest_close.toFixed(2)}</div>
                        <div class="fund-change ${f.change_pct >= 0 ? 'up' : 'down'}">${f.change_pct >= 0 ? '▲ +' : '▼ '}${f.change_pct.toFixed(2)}%</div>
                    </div>
                </div>
                <div class="fund-metrics">
                    <div class="metric"><div class="metric-label">年化收益</div><div class="metric-value" style="color:${f.annual_return >= 0 ? 'var(--green)' : 'var(--red)'}">${f.annual_return >= 0 ? '+' : ''}${f.annual_return.toFixed(1)}%</div></div>
                    <div class="metric"><div class="metric-label">52W高</div><div class="metric-value">$${f.high.toFixed(0)}</div></div>
                    <div class="metric"><div class="metric-label">52W低</div><div class="metric-value">$${f.low.toFixed(0)}</div></div>
                </div>
                <div class="mini-chart" id="mini-${f.ticker}"></div>
            </a>
        `).join('');
    }

    function renderCompare() {
        const tbody = document.getElementById('compare-tbody');
        const best = { ret: null, vol: null };
        OVERVIEW.forEach(f => {
            if (best.ret === null || f.annual_return > best.ret) best.ret = f.annual_return;
            if (best.vol === null || f.volatility < best.vol) best.vol = f.volatility;
        });
        tbody.innerHTML = OVERVIEW.map(f => `
            <tr>
                <td><a class="ticker-link" href="/${f.ticker.toLowerCase()}/">${f.ticker}</a></td>
                <td>${f.name}</td>
                <td class="num">$${f.latest_close.toFixed(2)}</td>
                <td class="num">$${f.high.toFixed(2)}</td>
                <td class="num">$${f.low.toFixed(2)}</td>
                <td class="num ${f.annual_return === best.ret ? 'best' : ''}" style="color:${f.annual_return >= 0 ? 'var(--green)' : 'var(--red)'}">${f.annual_return >= 0 ? '+' : ''}${f.annual_return.toFixed(2)}%</td>
                <td class="num ${f.volatility === best.vol ? 'best' : ''}">${f.volatility.toFixed(2)}%</td>
                <td class="num">${f.data_points}</td>
            </tr>
        `).join('');
    }

    function drawMiniCharts() {
        OVERVIEW.forEach(f => {
            const el = document.getElementById('mini-' + f.ticker);
            if (!el) return;
            const chart = echarts.init(el);
            const prices = f.price_history.map(p => p.close);
            const min = Math.min(...prices), max = Math.max(...prices);
            chart.setOption({
                backgroundColor: 'transparent',
                grid: { left: 0, right: 0, top: 2, bottom: 0 },
                xAxis: { type: 'category', show: false, data: f.price_history.map(p => p.date) },
                yAxis: { type: 'value', show: false, min, max },
                series: [{
                    type: 'line',
                    data: prices,
                    smooth: true,
                    symbol: 'none',
                    lineStyle: { width: 1.5, color: f.change_pct >= 0 ? '#3fb950' : '#f85149' },
                    areaStyle: {
                        color: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1,
                            colorStops: [
                                { offset: 0, color: f.change_pct >= 0 ? 'rgba(63,185,80,0.2)' : 'rgba(248,81,73,0.2)' },
                                { offset: 1, color: 'transparent' }
                            ]
                        }
                    }
                }]
            });
        });
    }

    renderGrid();
    renderCompare();
    setTimeout(drawMiniCharts, 100);
    window.addEventListener('resize', () => { if (window.drawMiniCharts) drawMiniCharts(); });
    </script>
</body>
</html>
