        /* ── Hero ── */
        .hero { max-width: 1400px; margin: 0 auto; padding: 24px; }
        .stock-header { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
        .stock-title { display: flex; align-items: center; gap: 16px; }
        .ticker-badge { font-size: 32px; font-weight: 700; color: var(--gold); letter-spacing: 2px; }
        .stock-name { font-size: 22px; font-weight: 600; color: var(--text-primary); }
        .stock-category { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
        .stock-price-block { text-align: right; }
        .current-price { font-size: 36px; font-weight: 700; color: var(--text-primary); }
        .price-change { font-size: 16px; margin-top: 4px; }
        .price-change.up { color: var(--green); }
        .price-change.down { color: var(--red); }

        /* ── 内容区 ── */
        .content { max-width: 1400px; margin: 0 auto; padding: 0 24px 48px; display: grid; grid-template-columns: 1fr 320px; gap: 24px; }

        .chart-section { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }

        .chart-title { font-size: 15px; font-weight: 600; }
        #chart { width: 100%; height: 320px; }

        /* ── 侧边栏 ── */
        .sidebar { display: flex; flex-direction: column; gap: 16px; }
        .side-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
        .side-title { font-size: 14px; font-weight: 600; margin-bottom: 16px; color: var(--text-primary); }
        
        /* 状态标签 */
        .status-tag {
            display: inline-block; padding: 6px 14px; border-radius: 8px;
            font-size: 13px; font-weight: 600; margin-bottom: 16px;
        }
        .status-tag.bullish { background: rgba(63,185,80,0.15); color: var(--green); border: 1px solid rgba(63,185,80,0.3); }
        .status-tag.bearish { background: rgba(248,81,73,0.15); color: var(--red); border: 1px solid rgba(248,81,73,0.3); }
        .status-tag.neutral { background: rgba(212,168,67,0.15); color: var(--gold); border: 1px solid rgba(212,168,67,0.3); }
        
        .indicator-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
        .indicator-row:last-child { border-bottom: none; }
        .indicator-name { color: var(--text-secondary); }
        .indicator-value { font-weight: 600; color: var(--text-primary); }
        
        /* 波动率进度条 */
        .volatility-bar { margin-top: 12px; }
        .volatility-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 6px; display: flex; justify-content: space-between; }
        .volatility-track { width: 100%; height: 8px; background: var(--bg-secondary); border-radius: 4px; overflow: hidden; }

        .volatility-fill.medium { background: var(--gold); }
        .volatility-fill.high { background: var(--red); }

        /* 对比表格 */

        .compare-table td:first-child { text-align: left; font-weight: 600; }
        .compare-table tr:hover td { background: rgba(255,255,255,0.03); }

        footer { background: var(--bg-secondary); border-top: 1px solid var(--border); padding: 24px; text-align: center; font-size: 13px; color: var(--text-secondary); }
        footer a { color: var(--text-secondary); margin: 0 8px; }

        @media (max-width: 900px) {

        }

    function filterByPeriod(data, period) {
        if (period === 'all') return data;
        const now = new Date(data[data.length - 1].date);
        const cutoff = new Date(now);
        if (period === '1y') cutoff.setFullYear(now.getFullYear() - 1);
        else if (period === '5y') cutoff.setFullYear(now.getFullYear() - 5);
        return data.filter(d => new Date(d.date) >= cutoff);
    }

    let chart;
    function initChart() {
        chart = echarts.init(document.getElementById('chart'), 'dark');
        drawChart();
        window.addEventListener('resize', () => chart.resize());
    }

    function drawChart() {
        const data = filterByPeriod(FULL_DATA, '1y');
        const dates = data.map(d => d.date);

        const option = {
            backgroundColor: 'transparent',
            tooltip: { 
                trigger: 'axis', 
                axisPointer: { type: 'cross' },
                formatter: function(params) {
                    const d = params[0];
                    let s = `<strong>${d.axisValue}</strong><br/>`;
                    params.forEach(p => {
                        if (p.seriesName === '收盘价') {
                            s += `${p.marker} ${p.seriesName}: <strong>$${p.value !== null ? p.value.toFixed(2) : '-'}</strong><br/>`;

                    });
                    return s;
                }

                splitLine: { show: false }

            yAxis: [{
                type: 'value', 
                scale: true, 
                position: 'right', 
                splitLine: { lineStyle: { color: '#21262d' } }, 
                axisLabel: { color: '#8b949e', fontSize: 11, formatter: v => '$' + v.toFixed(0) } 
            }],
            dataZoom: [{
                type: 'inside', 
                xAxisIndex: [0], 
                start: 0, 
                end: 100

            series: [{
                name: '收盘价',
