# 数据同步配置
sync:
  # 免费套餐限制：每分钟最多5次请求，每次间隔≥15秒
  min_request_interval: 15
  # 单次请求最大记录数（免费套餐上限）
  max_records_per_request: 500
  # 历史数据起始日期（5年前）
  history_years: 5
  # 每日同步时间（北京时间，美股收盘后约30分钟）
  daily_sync_hour: 5
  daily_sync_minute: 30