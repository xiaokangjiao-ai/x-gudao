    name: "Vanguard S&P 500 ETF"
    category: "etf"
  - ticker: "QQQ"
    name: "Invesco QQQ Trust"
    category: "etf"
  - ticker: "VTI"
    name: "Vanguard Total Stock Market ETF"
    category: "etf"
  - ticker: "BND"
    name: "Vanguard Total Bond Market ETF"
    category: "etf"
  - ticker: "GLD"
    name: "SPDR Gold Shares"
    category: "etf"
  - ticker: "IWM"
    name: "iShares Russell 2000 ETF"
    category: "etf"

  # 全球市值最高 8 只股票（2026年6月）
  - ticker: "NVDA"
    name: "NVIDIA Corporation"
    category: "stock"
  - ticker: "AAPL"
    name: "Apple Inc."
    category: "stock"
  - ticker: "MSFT"
    name: "Microsoft Corporation"
    category: "stock"
  - ticker: "GOOGL"
    name: "Alphabet Inc."
    category: "stock"
  - ticker: "AMZN"
    name: "Amazon.com Inc."
    category: "stock"
  - ticker: "META"
